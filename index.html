            padding: 14px 12px;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .mu-summary-cell:last-child { border-right: none; }
        .mu-summary-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .mu-summary-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.82);
            font-variant-numeric: tabular-nums;
        }
        .mu-model-list { display: flex; flex-direction: column; }
        .mu-model-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .mu-model-item:last-child { border-bottom: none; }
        .mu-model-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }
        .mu-model-name-group {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }
        .mu-model-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .mu-model-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mu-source-tag {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 5px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .mu-source-tag.openclaw   { background: rgba(229,62,62,0.08); color: rgba(229,62,62,0.8); border: 1px solid rgba(229,62,62,0.18); }
        .mu-source-tag.codexbar   { background: rgba(99,179,237,0.08); color: rgba(99,179,237,0.8); border: 1px solid rgba(99,179,237,0.18); }
        .mu-source-tag.openrouter { background: rgba(34,211,238,0.08); color: #22d3ee; border: 1px solid rgba(34,211,238,0.25); font-weight: 600; }
        .mu-source-tag.other      { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.07); }
        .mu-model-total {
            font-size: 0.95rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            text-align: right;
        }
        .mu-model-bar-wrap {
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .mu-model-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mu-model-breakdown-row {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }
        .mu-bd-cell {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .mu-bd-label { font-size: 0.68rem; color: var(--text-muted); }
        .mu-bd-value { font-size: 0.78rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
        .mu-footer {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 12px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="lobster-bg" aria-hidden="true"></div>
    <div id="pull-indicator" class="pull-indicator">Pull to refresh</div>

    <!-- Main Content (PIN removed - open access) -->
    <div class="container" id="main-content">
        <header>
            <div class="logo">
                <div class="logo-icon"><img src="assets/logo.jpg" alt="Josh logo" /></div>
                <h1>Mission Control</h1>
            </div>
            <div class="header-status">
                <span class="god-mode-badge" id="god-mode-badge" style="display:none">⚡ God Mode</span>
                <div class="freshness-badge fresh" id="freshness-badge"><span class="freshness-dot"></span><span id="freshness-text">-</span></div>
                <button id="airpoint-toggle" onclick="toggleAirpoint()" title="Toggle AirPoint copilot notch">🖐️ AP</button>
                <button class="refresh-btn" onclick="forceUpdate()" id="refresh-btn" aria-label="Force update">
                    <span class="icon">↻</span>
                    <span class="spinner">↻</span>
                    Update
                </button>
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-label">Polling</span>
                </div>
                <div class="last-updated" id="last-updated-text">Loading...</div>
            </div>
        </header>

        <div class="alert-banner" id="action-required">
            <div class="alert-header">
                <h2>Action Required</h2>
            </div>
            <div class="alert-items" id="action-items"></div>
        </div>

        <div class="stats-row" id="stats-row"></div>

        <div class="kiosk-main">
        <div class="hero-grid">
            <div class="card card-brain">
                <div class="card-header">
                    <span class="icon"><img src="assets/icons/brain.png" alt="" class="section-icon-image"></span>
                    <h2>Brain Feed</h2>
                </div>
                <div id="brain-feed-card"></div>
            </div>
            <div class="card card-jobs">
                <div class="card-header">
                    <span class="icon"><img src="assets/icons/jobs.png" alt="" class="section-icon-image"></span>
                    <h2>Today's Jobs</h2>
                </div>
                <div id="today-jobs-card"></div>
            </div>
        </div>

        <div class="grid priority-grid">
            <div class="card card-model">
                <div class="card-header">
                    <span class="icon"><img src="assets/icons/usage.png" alt="" class="section-icon-image"></span>
                    <h2>Model Usage</h2>
                </div>
                <div id="model-usage-card"></div>
            </div>
            <div class="card card-events">
                <div class="card-header">
                    <span class="icon"><img src="assets/icons/calendar.png" alt="" class="section-icon-image"></span>
                    <h2>Upcoming</h2>
                </div>
                <div id="events-list"></div>
            </div>
            <div class="card card-devices">
                <div class="card-header">
                    <span class="icon"><img src="assets/icons/devices.png" alt="" class="section-icon-image"></span>
                    <h2>Devices</h2>
                </div>
                <div id="device-list"></div>
            </div>
            <!-- AirPoint copilot slot — transparent reserved space, copilot panel floats here -->
            <div class="card-airpoint" id="airpoint-slot" aria-hidden="true"></div>
        </div>
        </div><!-- /kiosk-main -->

    </div>

    <script>
        // ============================================
        // CONFIGURATION - Edit these values
        // ============================================
        const CONFIG = {
            PIN: '3699',  // Change this!
            DATA_URL: './data/dashboard-data.json',  // Path to your JSON file
            BRAIN_FEED_URL: './data/brain-feed.json',  // Fast-polled brain-feed sidecar
            REFRESH_INTERVAL: 10000,   // 10 seconds - full dashboard poll
            BRAIN_FEED_INTERVAL: 4000, // 4 seconds - brain feed only
        };
        // ============================================

        const pullIndicator = document.getElementById('pull-indicator');
        let pullStartY = null;
        let pullDistance = 0;
        const PULL_THRESHOLD = 70;

        let lastUpdateTime = null;
        let lastDashboardHash = {};  // section-level cache for diff
        let lastBrainFeedHash = null;
        let bfLastUpdatedTs = null;
        let bfCounterInterval = null;
        let updateTickerInterval;

        function isKioskMode() {
            return window.matchMedia('(min-width: 1400px) and (min-height: 880px)').matches;
        }

        function isPhoneMode() {
            return window.matchMedia('(max-width: 480px)').matches;
        }

        function syncViewportMode() {
            const phoneMode = isPhoneMode();
            document.body.classList.toggle('kiosk-mode', isKioskMode());
            document.body.classList.toggle('phone-mode', phoneMode);
            document.body.classList.toggle('edge-laser-on', !!(phoneMode && window._mcLastBrainFeed && window._mcLastBrainFeed.active));
        }

        function setConnectionStatus(state) {
            const statusEl = document.getElementById('connection-status');
            if (!statusEl) return;
            statusEl.classList.remove('offline', 'degraded');
            if (state === 'offline') {
                statusEl.classList.add('offline');
            } else if (state === 'degraded') {
                statusEl.classList.add('degraded');
            }
            const label = statusEl.querySelector('.status-label');
            if (label) {
                const labels = { offline: '⚡ Offline', degraded: '⚠ Retrying...', online: 'Polling' };
                label.textContent = labels[state] || 'Polling';
            }
        }

        function updateFreshnessBadge() {
            if (!lastUpdateTime) return;
            const badge = document.getElementById('freshness-badge');
            const text = document.getElementById('freshness-text');
            if (!badge || !text) return;
            const ageSecs = (Date.now() - lastUpdateTime) / 1000;
            badge.classList.remove('fresh', 'stale', 'old');
            if (ageSecs < 60) {
                badge.classList.add('fresh');
                text.textContent = ageSecs < 5 ? 'Fresh' : `${Math.floor(ageSecs)}s ago`;
            } else if (ageSecs < 300) {
                badge.classList.add('stale');
                text.textContent = `${Math.floor(ageSecs / 60)}m ago`;
            } else {
                badge.classList.add('old');
                text.textContent = `${Math.floor(ageSecs / 60)}m ago`;
            }
        }

        function handleTouchStart(event) {
            if (window.scrollY === 0) {
                pullStartY = event.touches[0].clientY;
            } else {
                pullStartY = null;
            }
        }

        function handleTouchMove(event) {
            if (pullStartY === null || !pullIndicator) return;
            pullDistance = event.touches[0].clientY - pullStartY;
            if (pullDistance > 0) {
                event.preventDefault();
                const offset = Math.min(pullDistance, 120);
                pullIndicator.style.transform = `translateY(${offset}px)`;
                pullIndicator.classList.add('visible');
                pullIndicator.textContent = pullDistance > PULL_THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
            }
        }

        function handleTouchEnd() {
            if (pullIndicator) {
                pullIndicator.classList.remove('visible');
                pullIndicator.style.transform = '';
            }
            if (pullDistance > PULL_THRESHOLD) {
                forceUpdate();
            }
            pullStartY = null;
            pullDistance = 0;
        }

        function attachPullToRefresh() {
            if (window.__mcPullAttached || !pullIndicator) return;
            window.addEventListener('touchstart', handleTouchStart, { passive: true });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd);
            window.__mcPullAttached = true;
        }

        // PIN removed - auto-init dashboard on load
        syncViewportMode();
        setConnectionStatus(navigator.onLine ? 'online' : 'offline');
        window.addEventListener('online', () => setConnectionStatus('online'));
        window.addEventListener('offline', () => setConnectionStatus('offline'));
        window.addEventListener('resize', syncViewportMode);
        window.addEventListener('orientationchange', syncViewportMode);

        function updateLastUpdatedTicker() {
            if (!lastUpdateTime) return;
            const now = new Date();
            const diffSecs = Math.floor((now - lastUpdateTime) / 1000);
            let text;
            if (diffSecs < 5) text = 'Just now';
            else if (diffSecs < 60) text = `${diffSecs}s ago`;
            else if (diffSecs < 3600) text = `${Math.floor(diffSecs / 60)}m ago`;
            else text = `${Math.floor(diffSecs / 3600)}h ago`;
            document.getElementById('last-updated-text').textContent = `Updated ${text}`;
            updateFreshnessBadge();
            updateBfCounter();
        }

        function updateBfCounter() {
            const el = document.getElementById('bf-last-updated');
            if (!el || !bfLastUpdatedTs) return;
            const diffSecs = Math.floor((Date.now() - bfLastUpdatedTs) / 1000);
            if (diffSecs < 5) el.textContent = 'just now';
            else if (diffSecs < 60) el.textContent = `${diffSecs}s ago`;
            else el.textContent = `${Math.floor(diffSecs / 60)}m ago`;
        }

        function getBrainFeedStateLabel(bf) {
            if (!bf) return 'Idle';
            const updatedAt = bf.updatedAt ? new Date(bf.updatedAt).getTime() : null;
            const ageSecs = updatedAt ? (Date.now() - updatedAt) / 1000 : Infinity;
            if (bf.active && ageSecs < 60) return 'Live';
            if (bf.active) return 'Active';
            if (updatedAt && ageSecs >= 600) return 'Stale';
            return 'Idle';
        }

        async function fetchData() {
            const t0 = performance.now();
            try {
                const cacheBuster = `?_=${Date.now()}`;
                const response = await fetch(CONFIG.DATA_URL + cacheBuster);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                const latency = Math.round(performance.now() - t0);
                console.debug(`[MC] dashboard-data.json fetched in ${latency}ms`);
                lastUpdateTime = new Date(data.lastUpdated || Date.now());
                renderDashboard(data);
                updateFreshnessBadge();
                setConnectionStatus('online');
                document.getElementById('main-content').classList.add('flash-update');
                setTimeout(() => document.getElementById('main-content').classList.remove('flash-update'), 1000);
                return true;
            } catch (err) {
                console.error('Failed to fetch dashboard data:', err);
                setConnectionStatus(navigator.onLine ? 'degraded' : 'offline');
                return false;
            }
        }

        // Fast brain-feed poll - only updates the Brain Feed card
        async function fetchBrainFeed() {
            const t0 = performance.now();
            try {
                const cacheBuster = `?_=${Date.now()}`;
                const response = await fetch(CONFIG.BRAIN_FEED_URL + cacheBuster);
                if (!response.ok) return;
                const bf = await response.json();
                const latency = Math.round(performance.now() - t0);
                console.debug(`[MC] brain-feed.json fetched in ${latency}ms`);
                const newHash = JSON.stringify(bf);
                if (newHash === lastBrainFeedHash) return; // no change
                lastBrainFeedHash = newHash;
                bfLastUpdatedTs = bf.updatedAt ? new Date(bf.updatedAt).getTime() : Date.now();
                renderBrainFeed(bf);
                updateBfFreshness(bf);
            } catch (err) {
                // non-fatal - full poll still runs every 10s
            }
        }

        function updateBfFreshness(bf) {
            const dot = document.querySelector('.bf-fresh-dot');
            const label = document.getElementById('bf-freshness-label-text');
            if (!dot) return;
            const isActive = bf && bf.active;
            const ageSecs = bfLastUpdatedTs ? (Date.now() - bfLastUpdatedTs) / 1000 : 9999;
            const isFresh = ageSecs < 60;
            const isStale = ageSecs >= 600;
            if (isActive && isFresh) {
                dot.style.background = '#e53e3e';
                if (label) label.textContent = 'Live';
            } else if (isActive) {
                dot.style.background = '#fbbf24';
                if (label) label.textContent = 'Active';
            } else if (isStale && bf && bf.updatedAt) {
                dot.style.background = '#fbbf24';
                if (label) label.textContent = 'Stale';
            } else {
                dot.style.background = 'rgba(255,255,255,0.2)';
                if (label) label.textContent = 'Idle';
            }
        }

        async function forceUpdate() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            await fetchData();
            setTimeout(() => btn.classList.remove('loading'), 500);
        }

        /* ---- AirPoint copilot notch toggle ---- */
        function toggleAirpoint() {
            const isActive = document.body.classList.toggle('airpoint-active');
            localStorage.setItem('mc_airpoint_active', isActive ? '1' : '0');
        }
        function initAirpointState() {
            // Default ON (AirPoint is always up per user preference)
            const stored = localStorage.getItem('mc_airpoint_active');
            const active = stored === null ? true : stored === '1';
            document.body.classList.toggle('airpoint-active', active);
        }

        function initDashboard() {
            initAirpointState();
            fetchData();
            fetchBrainFeed();
            updateLastUpdatedTicker();
            updateTickerInterval = setInterval(updateLastUpdatedTicker, 1000);
            setInterval(fetchData, CONFIG.REFRESH_INTERVAL);
            setInterval(fetchBrainFeed, CONFIG.BRAIN_FEED_INTERVAL);
            attachPullToRefresh();
            // Show god mode badge (visual only)
            const godBadge = document.getElementById('god-mode-badge');
            if (godBadge) godBadge.style.display = 'inline-flex';
        }

        function iconMarkup(name) {
            return `<img src="assets/icons/${name}.png" alt="" class="section-icon-image">`;
        }

        function sanitizeLabel(text) {
            return String(text || '').replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '').trim();
        }

        // ===== Brain Feed renderer (called both from fast-poll and full render) =====
        function toolPillClass(tool) {
            if (!tool) return 'tool-default';
            const t = tool.toLowerCase();
            if (t === 'read' || t === 'write' || t === 'edit') return 'tool-read';
            if (t === 'image' || t === 'image_generate') return 'tool-image';
            if (t.includes('claude') || t.includes('sonnet') || t.includes('gpt') || t.includes('gemini')) return 'tool-claude';
            if (t === 'git' || t === 'github') return 'tool-git';
            if (t === 'exec' || t === 'process') return 'tool-exec';
            if (t.includes('web') || t === 'fetch' || t === 'search') return 'tool-web';
            return 'tool-default';
        }

        function renderBrainFeed(bf) {
            const brainFeedCard = document.getElementById('brain-feed-card');
            if (!brainFeedCard) return;
            window._mcLastBrainFeed = bf || null;
            const brainCard = brainFeedCard.closest('.card-brain');
            const kioskMode = isKioskMode();
            const phoneMode = isPhoneMode();
            const stateLabel = getBrainFeedStateLabel(bf);

            // Freshness strip HTML (always present)
            const freshnessStrip = `<div class="bf-freshness-row">
                <span class="bf-fresh-dot" style="background:rgba(255,255,255,0.2)"></span>
                <span class="bf-freshness-label" id="bf-freshness-label-text">${stateLabel}</span>
                <span id="bf-last-updated">${bf && bf.updatedAt ? formatTime(bf.updatedAt) : '-'}</span>
            </div>`;

            if (bf && bf.active) {
                brainCard.classList.add('brain-active');
                document.body.classList.toggle('edge-laser-on', phoneMode);
                const msgTime = bf.messageReceived ? formatAbsoluteTime(bf.messageReceived) : '';
                const updatedTime = bf.updatedAt ? formatTime(bf.updatedAt) : '';
                const stepsHtml = (bf.steps || []).map(step => {
                    const stepClass = step.status === 'done' ? 'done-step' : step.status === 'active' ? 'active-step' : 'pending-step';
                    const iconClass = step.status === 'done' ? 'done' : step.status === 'active' ? 'active' : 'pending';
                    const iconChar = step.status === 'done' ? '✓' : step.status === 'active' ? '●' : '○';
                    const toolHtml = step.tool ? `<span class="bf-tool-pill ${toolPillClass(step.tool)}">${escapeHtml(step.tool)}</span>` : '';
                    return `<div class="bf-step ${stepClass}">
                        <div class="bf-step-icon ${iconClass}">${iconChar}</div>
                        <div class="bf-step-body">
                            <div class="bf-step-label">${escapeHtml(step.label)}</div>
                            ${toolHtml}
                        </div>
                    </div>`;
                }).join('');
                brainFeedCard.innerHTML = `
                    ${freshnessStrip}
                    <div class="bf-container">
                        <div class="bf-msg-banner">
                            <span class="bf-msg-dot"></span>
                            <span class="bf-msg-label">Message Received</span>
                            <span class="bf-msg-time">${escapeHtml(msgTime)}</span>
                        </div>
                        <div class="bf-objective">
                            <div class="bf-objective-kicker">Current Objective</div>
                            <div class="bf-objective-text">${escapeHtml(bf.objective || 'Processing...')}</div>
                        </div>
                        ${bf.currentTool ? `
                        <div class="bf-current-tool-bar">
                            <span class="bf-ct-pulse"></span>
                            <span class="bf-ct-label">Active tool</span>
                            <span class="bf-ct-tool">${escapeHtml(bf.currentTool)}</span>
                            ${updatedTime ? `<span class="bf-msg-time" style="margin-left:auto">${escapeHtml(updatedTime)}</span>` : ''}
                        </div>` : ''}
                        <div class="bf-timeline">${stepsHtml || '<div class="empty-state">No steps yet</div>'}</div>
                    </div>
                `;
            } else {
                brainCard.classList.remove('brain-active');
                document.body.classList.remove('edge-laser-on');
                // Use cached focus/activity data if available
                const focusData = window._mcLastFocus;
                const activityData = window._mcLastActivity;
                const modelUsageData = window._mcLastModelUsage;
                const cronsData = window._mcLastCrons;
                const productsData = window._mcLastProducts;
                const percent = Math.max(0, Math.min(100, Math.round(((focusData && focusData.runway) || 0) * 100)));
                const feedItems = (activityData || []).slice(0, kioskMode ? 4 : phoneMode ? 4 : 6);
                const liveSignals = [
                    modelUsageData ? `Session ${formatCurrencyAlways(modelUsageData.session)}` : null,
                    modelUsageData ? `Daily ${formatCurrencyAlways(modelUsageData.daily)}` : null,
                    (cronsData || []).length ? `${(cronsData || []).filter(c => c.status === 'ok').length} active crons` : null,
                    (productsData || []).length ? `${(productsData || []).filter(p => p.status === 'live').length} live products` : null
                ].filter(Boolean);
                brainFeedCard.innerHTML = `
                    ${freshnessStrip}
                    <div class="bf-idle-container brain-feed">
                        <div class="brain-hero">
                            <div class="brain-kicker">Live Operator State</div>
                            <div class="brain-title">${escapeHtml((focusData && focusData.status) || 'Mission Control Online')}</div>
                            <p class="focus-context">${escapeHtml((focusData && focusData.context) || 'No current context')}</p>
                            <div class="focus-meter">
                                <div class="focus-meter-bar"><span style="width:${percent}%"></span></div>
                                <span class="focus-meter-value">${percent}%</span>
                            </div>
                            <div class="brain-meta">
                                <span>${focusData && focusData.updatedAt ? `Updated ${formatTime(focusData.updatedAt)}` : 'Awaiting refresh'}</span>
                                ${modelUsageData && modelUsageData.lastUpdated ? `<span>Telemetry ${formatTime(modelUsageData.lastUpdated)}</span>` : ''}
                            </div>
                        </div>
                        <div class="brain-stream">
                            <div class="section-label">Recent Feed</div>
                            <div class="feed-list">
                                ${feedItems.length ? feedItems.map(item => `
                                    <div class="feed-item">
                                        <div class="feed-time">${formatTime(item.time)}</div>
                                        <div class="feed-text">${escapeHtml(item.event)}</div>
                                    </div>
                                `).join('') : '<div class="empty-state">No feed events yet</div>'}
                            </div>
                        </div>
                        <div class="brain-stream">
                            <div class="section-label">Signal Layer</div>
                            <div class="signal-strip">
                                ${liveSignals.length ? liveSignals.map(item => `<div class="signal-pill">${escapeHtml(item)}</div>`).join('') : '<div class="empty-state">No live signals yet</div>'}
                            </div>
                        </div>
                    </div>
                `;
            }
            // After DOM update, reapply freshness dot state
            if (bfLastUpdatedTs) updateBfFreshness(bf);
        }

        // ===== Section-level diff helpers =====
        function sectionChanged(key, newData) {
            const h = JSON.stringify(newData);
            if (lastDashboardHash[key] === h) return false;
            lastDashboardHash[key] = h;
            return true;
        }

        function renderDashboard(data) {
            const now = new Date();
            const kioskMode = isKioskMode();
            const phoneMode = isPhoneMode();
            const compactMode = kioskMode || phoneMode;

            // Cache context data for idle brain feed renderer
            window._mcLastFocus = data.focus;
            window._mcLastActivity = data.recentActivity;
            window._mcLastModelUsage = data.modelUsage;
            window._mcLastCrons = data.crons;
            window._mcLastProducts = data.products;

            // Brain Feed - delegate to dedicated renderer (fast-poll may have already done this)
            if (sectionChanged('brainFeed', data.brainFeed)) {
                renderBrainFeed(data.brainFeed);
                if (data.brainFeed) {
                    bfLastUpdatedTs = data.brainFeed.updatedAt ? new Date(data.brainFeed.updatedAt).getTime() : null;
                    updateBfFreshness(data.brainFeed);
                }
            }

            // Action Required (diff-guarded)
            if (!sectionChanged('actionRequired', data.actionRequired)) { /* skip */ } else
            { const actionBanner = document.getElementById('action-required');
            const actionItems = document.getElementById('action-items');
            if (data.actionRequired && data.actionRequired.length > 0) {
                actionBanner.classList.remove('empty');
                actionItems.innerHTML = data.actionRequired.map(item => `
                    <div class="alert-item">
                        <div class="alert-item-content">
                            <span class="priority ${item.priority}">${item.priority}</span>
                            <span>${escapeHtml(item.title)}</span>
                        </div>
                        ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Open →</a>` : ''}
                    </div>
                `).join('');
            } else {
                actionBanner.classList.add('empty');
            } }

            // Stats Row (diff-guarded)
            const statsRow = document.getElementById('stats-row');
            const enabledCrons = data.crons?.filter(c => c.status !== 'paused').length || 0;
            const pausedCrons = data.crons?.filter(c => c.status === 'paused').length || 0;
            const errorCrons = data.crons?.filter(c => c.errors > 0).length || 0;
            const upcomingCount = data.upcomingEvents?.length || 0;
            const deviceAttention = data.devices?.filter(d => d.status && d.status !== 'ok').length || 0;
            statsRow.innerHTML = `
                <div class="stat-pill"><span class="num">${enabledCrons}</span><span class="label">Active Crons</span></div>
                <div class="stat-pill"><span class="num">${pausedCrons}</span><span class="label">Paused</span></div>
                <div class="stat-pill"><span class="num">${upcomingCount}</span><span class="label">Upcoming</span></div>
                <div class="stat-pill"><span class="num">${deviceAttention}</span><span class="label">Device Alerts</span></div>
                ${errorCrons > 0 ? `<div class="stat-pill" style="border-color:var(--accent-red);"><span class="num" style="color:var(--accent-red);">${errorCrons}</span><span class="label">Cron Errors</span></div>` : ''}
            `;


            // Model usage snapshot - redesigned (diff-guarded)
            if (sectionChanged('modelUsage', data.modelUsage)) {
            const modelUsageCard = document.getElementById('model-usage-card');
            if (data.modelUsage) {
                const mu = data.modelUsage;
                const updatedStr = mu.lastUpdated ? formatTime(mu.lastUpdated) : null;
                // Update card header to show timestamp on right
                const muHeader = modelUsageCard.closest('.card')?.querySelector('.card-header h2');
                if (muHeader && updatedStr) {
                    if (!muHeader.parentElement.querySelector('.mu-header-ts')) {
                        const ts = document.createElement('span');
                        ts.className = 'mu-updated mu-header-ts';
                        ts.style.marginLeft = 'auto';
                        muHeader.parentElement.appendChild(ts);
                    }
                    const tsEl = muHeader.parentElement.querySelector('.mu-header-ts');
                    if (tsEl) tsEl.textContent = updatedStr;
                }
                const summaryHtml = `
                    <div class="mu-summary-row">
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Session</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.session)}</div>
                        </div>
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Daily</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.daily)}</div>
                        </div>
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Weekly</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.weekly)}</div>
                        </div>
                    </div>
                `;
                let breakdownHtml = '<div class="empty-state">No model calls yet</div>';
                if (mu.breakdown && mu.breakdown.length) {
                    // Sort by weekly cost desc (best proxy for total)
                    const sorted = [...mu.breakdown].sort((a, b) => (b.weeklyCost || 0) - (a.weeklyCost || 0));
                    const maxCost = sorted.reduce((m, x) => Math.max(m, x.weeklyCost || 0), 0) || 1;
                    // Generate a color per model
                    const palette = ['#e53e3e','#63b3ed','#9a75f5','#f97316','#4ade80','#fbbf24'];
                    breakdownHtml = `<div class="mu-model-list">${sorted.map((model, i) => {
                        const total = model.weeklyCost || 0;
                        const pct = Math.max(2, (total / maxCost) * 100).toFixed(1);
                        const color = palette[i % palette.length];
                        const src = (model.source || '').toLowerCase();
                        const srcClass = src.includes('openrouter') ? 'openrouter' : src.includes('codex') ? 'codexbar' : src.includes('openclaw') ? 'openclaw' : 'other';
                        const srcLabel = model.source || 'Unknown';
                        return `<div class="mu-model-item">
                            <div class="mu-model-top">
                                <div class="mu-model-name-group">
                                    <span class="mu-model-dot" style="background:${color}"></span>
                                    <span class="mu-model-name" title="${escapeHtml(model.name)}">${escapeHtml(model.name)}</span>
                                    <span class="mu-source-tag ${srcClass}">${escapeHtml(srcLabel)}</span>
                                </div>
                                <span class="mu-model-total">${formatCurrencyAlways(total)}</span>
                            </div>
                            <div class="mu-model-bar-wrap">
                                <div class="mu-model-bar-fill" style="width:${pct}%;background:${color};opacity:0.85"></div>
                            </div>
                            <div class="mu-model-breakdown-row">
                                <span class="mu-bd-cell"><span class="mu-bd-label">Session</span><span class="mu-bd-value">${formatCurrencyAlways(model.sessionCost || 0)}</span></span>
                                <span class="mu-bd-cell"><span class="mu-bd-label">Daily</span><span class="mu-bd-value">${formatCurrencyAlways(model.dailyCost || 0)}</span></span>
                                <span class="mu-bd-cell"><span class="mu-bd-label">Weekly</span><span class="mu-bd-value">${formatCurrencyAlways(model.weeklyCost || 0)}</span></span>
                            </div>
                        </div>`;
                    }).join('')}</div>`;
                }
                const policyNote = `<div style="display:flex;align-items:center;gap:8px;margin-top:12px;padding:8px 12px;background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);border-radius:8px;font-size:0.7rem;">
                    <span style="color:#22d3ee;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Policy</span>
                    <span style="color:rgba(255,255,255,0.45);">OpenRouter: Sonnet-only routing (no Opus)</span>
                </div>`;
                modelUsageCard.innerHTML = summaryHtml + breakdownHtml + policyNote + `<div class="mu-footer">Totals reflect tracked models only</div>`;
            modelUsageCard.classList.remove('section-updated');
            void modelUsageCard.offsetWidth; // trigger reflow
            modelUsageCard.classList.add('section-updated');
            } else {
                modelUsageCard.innerHTML = '<div class="empty-state">No telemetry yet</div>';
            }
            } // end model usage diff guard

            // Upcoming events (diff-guarded)
            if (sectionChanged('upcomingEvents', data.upcomingEvents)) {
            const eventsList = document.getElementById('events-list');
            if (data.upcomingEvents && data.upcomingEvents.length > 0) {
                eventsList.innerHTML = data.upcomingEvents.slice(0, compactMode ? 3 : 4).map(event => `
                    <div class="event-item">
                        <div class="event-time">${formatEventTime(event.time)}</div>
                        <div class="event-detail">
                            <div>${escapeHtml(event.title)}</div>
                            <div class="event-source">${escapeHtml(event.source || '')}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                eventsList.innerHTML = '<div class="empty-state">No upcoming events</div>';
            }
            } // end events diff guard

            // Device & watchdog status (diff-guarded)
            if (sectionChanged('devices', data.devices)) {
            const deviceList = document.getElementById('device-list');
            if (data.devices && data.devices.length > 0) {
                deviceList.innerHTML = data.devices.map(device => {
                    const statusClass = device.status === 'ok' ? 'ok' : device.status === 'error' ? 'error' : 'attention';
                    const statusLabel = device.status ? device.status.toUpperCase() : 'UNKNOWN';
                    return `
                        <div class="device-item">
                            <div class="device-name">${escapeHtml(device.name)}</div>
                            <div class="device-status ${statusClass}">${statusLabel}</div>
                            <p class="device-detail">${escapeHtml(device.detail || '')}</p>
                        </div>
                    `;
                }).join('');
            } else {
                deviceList.innerHTML = '<div class="empty-state">No device data</div>';
            }
            } // end devices diff guard

            // Today's Jobs (diff-guarded)
            if (sectionChanged('crons', data.crons)) {
            const todayJobsCard = document.getElementById('today-jobs-card');
            const cronRows = (data.crons || []).slice(0, kioskMode ? 3 : phoneMode ? 3 : 5).map(cron => {
                const chipClass = cron.status === 'ok' ? 'ok' : cron.status === 'paused' ? 'paused' : 'error';
                const cronMeta = [cron.schedule || 'No schedule', cron.errors > 0 ? `${cron.errors} error${cron.errors === 1 ? '' : 's'}` : null].filter(Boolean).join(' · ');
                return `
                    <div class="job-row">
                        <div>
                            <div class="job-name">${escapeHtml(cron.name)}</div>
                            <div class="job-detail">${escapeHtml(cronMeta)}</div>
                        </div>
                        <div class="job-chip ${chipClass}">${escapeHtml(cron.status || 'unknown')}</div>
                    </div>
                `;
            }).join('');
            const eventRows = (data.upcomingEvents || []).slice(0, compactMode ? 3 : 4).map(event => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(event.title || 'Untitled event')}</div>
                        <div class="job-detail">${escapeHtml(event.source || '')}</div>
                    </div>
                    <div class="job-chip">${escapeHtml(formatEventTime(event.time))}</div>
                </div>
            `).join('');
            const actionRows = (data.actionRequired || []).slice(0, compactMode ? 3 : 4).map(item => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(item.title || 'Action')}</div>
                        <div class="job-detail">${escapeHtml(item.priority || 'queued')}</div>
                    </div>
                    <div class="job-chip error">${escapeHtml(item.priority || 'alert')}</div>
                </div>
            `).join('');
            todayJobsCard.innerHTML = `
                <div class="jobs-shell">
                    <div class="job-group">
                        <div class="job-group-title">Automation Queue</div>
                        ${cronRows || '<div class="empty-state">No scheduled jobs</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Calendar / Triggers</div>
                        ${eventRows || '<div class="empty-state">No upcoming events</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Action Required</div>
                        ${actionRows || '<div class="empty-state">Nothing urgent</div>'}
                    </div>
                </div>
            `;
            } // end crons diff guard

        }

        function formatTime(isoString) {
            if (!isoString) return 'never';
            const date = new Date(isoString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffMins < 1440) return `${Math.floor(diffMins / 60)}h ago`;
            return date.toLocaleDateString();
        }

        function formatCurrencyValue(value) {
            if (typeof value !== 'number') return '$0.00';
            if (value === 0) return '$0.00';
            if (value < 1) return `${(value * 100).toFixed(2)}¢`;
            return `$${value.toFixed(2)}`;
        }

        function formatCurrencyAlways(value) {
            if (typeof value !== 'number' || isNaN(value)) return '$0.00';
            if (value === 0) return '$0.00';
            if (value >= 0.01) return `$${value.toFixed(2)}`;
            // Show more precision for sub-cent values
            return `$${value.toFixed(4)}`;
        }

        function formatAbsoluteTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return isoString;
            return date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', second: '2-digit' });
        }

        function formatEventTime(isoString) {
            if (!isoString) return 'TBD';
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) return isoString;
            const day = date.toLocaleDateString(undefined, { weekday: 'short' });
            const time = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            return `${day} ${time}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        // === AUTO-INIT (after all functions defined) ===
        initDashboard();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => {
                    console.error('Service worker registration failed', err);
                });
            });
        }
    </script>

    <!-- Mobile viewport laser border overlay -->
    <div id="edge-laser" aria-hidden="true"></div>

</body>
</html>
