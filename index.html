<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#05060b">
    <link rel="apple-touch-icon" href="assets/logo-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0b0f;
            --bg-secondary: #0f1117;
            --bg-tertiary: #141720;
            --bg-card: #12151d;
            --bg-hover: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: rgba(243, 244, 246, 0.82);
            --text-muted: rgba(243, 244, 246, 0.48);
            --accent-focus: #8b5cf6;
            --accent-model: #f59e0b;
            --accent-events: #ef4444;
            --accent-devices: #22c55e;
            --accent-active: #3b82f6;
            --accent-cron: #a78bfa;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #090b10 0%, #0b0d13 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            overscroll-behavior-y: contain;
        }
        #password-overlay {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .password-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }
        .password-box h2 { font-size: 1.5rem; margin-bottom: 8px; }
        .password-box p { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 24px; }
        .password-box input {
            width: 100%; padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 4px;
        }
        .password-box input:focus { outline: none; border-color: var(--accent-blue); }
        .password-box button {
            width: 100%; padding: 12px 24px;
            background: var(--accent-blue);
            color: white; border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .password-box button:hover { opacity: 0.9; }
        .password-error { color: var(--accent-red); font-size: 0.875rem; margin-top: 12px; display: none; }
        
        .container { width: min(100%, 1200px); margin: 0 auto; padding: clamp(20px, 4vw, 48px); }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            overflow: hidden;
        }
        .logo-icon img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .logo h1 { font-size: 1.5rem; font-weight: 600; }
        .header-status { display: flex; align-items: center; gap: 12px; }
        .connection-status {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem; font-weight: 500;
            color: var(--accent-yellow);
            border-color: var(--accent-yellow);
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .connection-status.offline {
            color: var(--accent-events);
            border-color: var(--accent-events);
        }
        .connection-status.degraded {
            color: var(--accent-cron);
            border-color: var(--accent-cron);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .last-updated { color: var(--text-muted); font-size: 0.875rem; }
        .pull-indicator {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px));
            left: 0; right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            pointer-events: none;
            opacity: 0;
            transform: translateY(-40px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 900;
        }
        .pull-indicator.visible {
            opacity: 1;
        }
        .refresh-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.25); color: var(--text-primary); }
        .refresh-btn:active { transform: scale(0.97); }
        .refresh-btn.loading { pointer-events: none; opacity: 0.6; }
        .refresh-btn .spinner { display: none; animation: spin 1s linear infinite; }
        .refresh-btn.loading .spinner { display: inline; }
        .refresh-btn.loading .icon { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .alert-banner {
            background: linear-gradient(120deg, rgba(255,77,58,0.25), rgba(255,115,80,0.12));
            border: 1px solid rgba(255,77,58,0.35);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .alert-banner.empty { display: none; }
        .alert-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .alert-header h2 { font-size: 1rem; font-weight: 600; color: var(--accent-orange); }
        .alert-items { display: flex; flex-direction: column; gap: 12px; }
        .alert-item {
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .alert-item-content { display: flex; align-items: center; gap: 12px; }
        .priority {
            padding: 4px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 500; text-transform: uppercase;
        }
        .priority.high { background: var(--accent-red); color: white; }
        .priority.medium { background: var(--accent-orange); color: white; }
        .priority.low { background: var(--accent-yellow); color: black; }
        .alert-item a { color: var(--accent-blue); font-size: 0.875rem; text-decoration: none; }
        .alert-item a:hover { text-decoration: underline; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .hero-grid { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.9fr); gap: 24px; margin-bottom: 24px; align-items: stretch; }
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .header-status {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                background: var(--bg-tertiary);
                border-radius: 16px;
                padding: 12px;
            }
            .refresh-btn { flex: 1; justify-content: center; }
            .last-updated { order: 3; width: 100%; text-align: right; font-size: 0.8rem; }
        }
        @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        @media (max-width: 480px) {
            .password-box { padding: 28px 20px; }
            .logo h1 { font-size: 1.25rem; }
            .stats-row { gap: 8px; }
            .card { padding: 18px; }
            .product-grid { grid-template-columns: 1fr; }
        }
        
        .card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: none;
            backdrop-filter: none;
        }
        .card::after { display: none; }
        .card-focus,
        .card-brain,
        .card-jobs,
        .card-model,
        .card-events,
        .card-devices,
        .card-active,
        .card-activity,
        .card-products,
        .card-cron { border-color: var(--border); box-shadow: none; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .card-header h2 { font-size: 1rem; font-weight: 600; color: var(--text-secondary); }
        .card-header .icon { font-size: 1.125rem; }
        
        .active-task {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .active-task:last-child { margin-bottom: 0; }
        .active-indicator {
            width: 10px; height: 10px;
            background: var(--accent-active);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .active-task-info { flex: 1; }
        .active-task-name { font-weight: 500; margin-bottom: 2px; }
        .active-task-meta { font-size: 0.75rem; color: var(--text-muted); }
        .empty-state {
            color: var(--text-muted); font-size: 0.875rem;
            padding: 20px; text-align: center;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .product-card {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 16px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .product-card:hover { background: var(--bg-hover); border-color: rgba(255, 255, 255, 0.25); }
        .product-name { font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        .product-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem; font-weight: 500;
            margin-bottom: 8px;
        }
        .product-status.live { background: rgba(74, 222, 128, 0.15); color: rgba(74, 222, 128, 1); }
        .product-status.testing { background: rgba(253, 224, 71, 0.15); color: var(--accent-cron); }
        .product-status.down { background: rgba(255, 77, 58, 0.15); color: var(--accent-events); }
        .product-status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .product-checked { font-size: 0.75rem; color: var(--text-muted); }
        
        .cron-table { width: 100%; }
        .cron-row {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cron-row:hover { background: var(--bg-tertiary); }
        .cron-row.has-error { background: rgba(239,68,68,0.08); }
        .cron-name { font-weight: 500; font-size: 0.875rem; }
        .cron-schedule { font-size: 0.75rem; color: var(--text-muted); }
        .cron-status { font-size: 1rem; }
        .cron-errors {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(239,68,68,0.2);
            color: var(--accent-red);
        }
        .cron-error-detail {
            display: none;
            grid-column: 1 / -1;
            padding: 12px;
            background: rgba(239,68,68,0.1);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--accent-red);
            margin-top: 8px;
        }
        .cron-row.expanded .cron-error-detail { display: block; }
        
        .activity-list { display: flex; flex-direction: column; gap: 2px; }
        .activity-item {
            display: flex; gap: 12px;
            padding: 10px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .activity-item:hover { background: var(--bg-tertiary); }
        .activity-time { font-size: 0.75rem; color: var(--text-muted); min-width: 60px; }
        .activity-event { font-size: 0.875rem; color: var(--text-secondary); }
        
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.875rem;
        }
        .stat-pill .num { font-weight: 600; }
        .stat-pill .label { color: var(--text-muted); }
        

        .focus-status { font-weight: 600; font-size: 1.1rem; }
        .focus-context { color: var(--text-secondary); font-size: 0.9rem; margin: 8px 0 16px; }
        .focus-meter { display: flex; align-items: center; gap: 12px; }
        .focus-meter-bar { flex: 1; height: 8px; background: var(--bg-tertiary); border-radius: 999px; overflow: hidden; }
        .focus-meter-bar span { display: block; height: 100%; background: var(--accent-focus); border-radius: 999px; }
        .focus-meter-value { font-weight: 600; color: var(--accent-focus); }
        .focus-updated { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }
        .brain-feed { display: flex; flex-direction: column; gap: 16px; }
        .brain-hero {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 18px 16px;
        }
        .brain-kicker {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted); font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
            margin-bottom: 14px;
        }
        .brain-title {
            font-size: clamp(1.5rem, 3vw, 2.25rem);
            line-height: 1.05; font-weight: 600; color: var(--text-primary); margin-bottom: 10px;
        }
        .brain-meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-muted); font-size: 0.82rem; }
        .brain-stream, .jobs-shell {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }
        .section-label {
            font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted);
            margin-bottom: 12px;
        }
        .feed-list { display: flex; flex-direction: column; gap: 10px; }
        .feed-item {
            display: grid; grid-template-columns: 82px 1fr; gap: 12px; align-items: start;
            padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
        }
        .feed-time { color: var(--text-muted); font-size: 0.76rem; letter-spacing: 0.08em; text-transform: uppercase; }
        .feed-text { color: var(--text-secondary); font-size: 0.9rem; }
        .signal-strip { display: flex; flex-wrap: wrap; gap: 10px; }
        .signal-pill {
            padding: 8px 10px; border-radius: 999px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07); color: var(--text-secondary); font-size: 0.78rem;
        }
        .jobs-shell { display: flex; flex-direction: column; gap: 14px; }
        .job-group { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
        .job-group:first-child { border-top: 0; padding-top: 0; }
        .job-group-title { color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; }
        .job-row {
            display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .job-row:last-child { border-bottom: 0; }
        .job-name { font-size: 0.92rem; color: var(--text-primary); }
        .job-detail { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .job-chip {
            padding: 6px 10px; border-radius: 999px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
            border: 1px solid rgba(255,255,255,0.08); color: var(--text-secondary);
        }
        .job-chip.ok { color: #86efac; border-color: rgba(134,239,172,0.18); background: rgba(34,197,94,0.08); }
        .job-chip.paused { color: #fde68a; border-color: rgba(253,230,138,0.18); background: rgba(245,158,11,0.08); }
        .job-chip.error { color: #fca5a5; border-color: rgba(252,165,165,0.18); background: rgba(239,68,68,0.08); }

        .model-usage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 12px; }
        .model-pill { background: var(--bg-tertiary); border-radius: 10px; padding: 12px; }
        .model-pill h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.2em; margin-bottom: 4px; }
        .model-pill .value { font-size: 1.1rem; font-weight: 600; }
        .model-list { display: flex; flex-direction: column; gap: 8px; }
        .model-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); }

        .event-item { display: flex; gap: 12px; padding: 10px 12px; background: var(--bg-tertiary); border-radius: 10px; }
        .event-time { font-weight: 600; font-size: 0.85rem; color: var(--text-primary); min-width: 90px; }
        .event-detail { flex: 1; }
        .event-source { font-size: 0.75rem; color: var(--text-muted); }

        .device-list { display: flex; flex-direction: column; gap: 10px; }
        .device-item { padding: 12px; border-radius: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); }
        .device-name { font-weight: 600; }
        .device-detail { font-size: 0.85rem; color: var(--text-muted); }
        .device-status { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; }
        .device-status.ok { color: var(--accent-green); }
        .device-status.attention { color: var(--accent-yellow); }
        .device-status.error { color: var(--accent-red); }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .card { padding: 20px; }
            .cron-row { grid-template-columns: 1fr auto; }
            .cron-schedule { display: none; }
            .header-status { flex-direction: column; align-items: flex-end; gap: 8px; }
        }
        
        @keyframes flash-update { 0% { background-color: rgba(34,197,94,0.2); } 100% { background-color: transparent; } }
        .flash-update { animation: flash-update 1s ease-out; }
    </style>
</head>
<body>
    <!-- Password Protection -->
    <div id="password-overlay">
        <div class="password-box">
            <h2>🔐 Mission Control</h2>
            <p>Enter your PIN to access the dashboard</p>
            <input type="password" id="pin-input" placeholder="••••••" maxlength="20" autofocus aria-label="PIN input">
            <button onclick="checkPassword()">Access Dashboard</button>
            <p class="password-error" id="password-error">Incorrect PIN. Try again.</p>
        </div>
    </div>

    <div id="pull-indicator" class="pull-indicator">Pull to refresh</div>

    <!-- Main Content -->
    <div class="container" id="main-content" style="display: none;">
        <header>
            <div class="logo">
                <div class="logo-icon"><img src="assets/logo.jpg" alt="Josh logo" /></div>
                <h1>Mission Control</h1>
            </div>
            <div class="header-status">
                <button class="refresh-btn" onclick="forceUpdate()" id="refresh-btn" aria-label="Force update">
                    <span class="icon">🔄</span>
                    <span class="spinner">⟳</span>
                    Update
                </button>
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-label">Polling</span>
                </div>
                <div class="last-updated" id="last-updated-text">Loading...</div>
            </div>
        </header>

        <div class="alert-banner" id="action-required">
            <div class="alert-header">
                <span>🚨</span>
                <h2>Action Required</h2>
            </div>
            <div class="alert-items" id="action-items"></div>
        </div>

        <div class="stats-row" id="stats-row"></div>

        <div class="hero-grid">
            <div class="card card-brain">
                <div class="card-header">
                    <span class="icon">🧠</span>
                    <h2>Brain Feed</h2>
                </div>
                <div id="brain-feed-card"></div>
            </div>
            <div class="card card-jobs">
                <div class="card-header">
                    <span class="icon">⚡</span>
                    <h2>Today's Jobs</h2>
                </div>
                <div id="today-jobs-card"></div>
            </div>
        </div>

        <div class="grid priority-grid">
            <div class="card card-model">
                <div class="card-header">
                    <span class="icon">💸</span>
                    <h2>Model Usage</h2>
                </div>
                <div id="model-usage-card"></div>
            </div>
            <div class="card card-events">
                <div class="card-header">
                    <span class="icon">📅</span>
                    <h2>Upcoming</h2>
                </div>
                <div id="events-list"></div>
            </div>
            <div class="card card-devices">
                <div class="card-header">
                    <span class="icon">🖥️</span>
                    <h2>Devices</h2>
                </div>
                <div id="device-list"></div>
            </div>
        </div>

        <div class="grid">
            <div class="card card-products">
                <div class="card-header">
                    <span class="icon">📊</span>
                    <h2>Products</h2>
                </div>
                <div class="product-grid" id="products-grid"></div>
            </div>
            <div class="card card-cron">
                <div class="card-header">
                    <span class="icon">⏰</span>
                    <h2>Cron Jobs</h2>
                </div>
                <div class="cron-table" id="cron-table"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION — Edit these values
        // ============================================
        const CONFIG = {
            PIN: '3699',  // Change this!
            DATA_URL: './data/dashboard-data.json',  // Path to your JSON file
            REFRESH_INTERVAL: 30000  // 30 seconds
        };
        // ============================================

        const pullIndicator = document.getElementById('pull-indicator');
        let pullStartY = null;
        let pullDistance = 0;
        const PULL_THRESHOLD = 70;

        let lastUpdateTime = null;
        let updateTickerInterval;

        function setConnectionStatus(state) {
            const statusEl = document.getElementById('connection-status');
            if (!statusEl) return;
            statusEl.classList.remove('offline', 'degraded');
            if (state === 'offline') {
                statusEl.classList.add('offline');
            } else if (state === 'degraded') {
                statusEl.classList.add('degraded');
            }
            const label = statusEl.querySelector('.status-label');
            if (label) {
                label.textContent = state === 'offline' ? 'Offline' : state === 'degraded' ? 'Retrying' : 'Polling';
            }
        }

        function handleTouchStart(event) {
            if (window.scrollY === 0 && sessionStorage.getItem('mc_authenticated') === 'true') {
                pullStartY = event.touches[0].clientY;
            } else {
                pullStartY = null;
            }
        }

        function handleTouchMove(event) {
            if (pullStartY === null || !pullIndicator) return;
            pullDistance = event.touches[0].clientY - pullStartY;
            if (pullDistance > 0) {
                event.preventDefault();
                const offset = Math.min(pullDistance, 120);
                pullIndicator.style.transform = `translateY(${offset}px)`;
                pullIndicator.classList.add('visible');
                pullIndicator.textContent = pullDistance > PULL_THRESHOLD ? 'Release to refresh' : 'Pull to refresh';
            }
        }

        function handleTouchEnd() {
            if (pullIndicator) {
                pullIndicator.classList.remove('visible');
                pullIndicator.style.transform = '';
            }
            if (pullDistance > PULL_THRESHOLD) {
                forceUpdate();
            }
            pullStartY = null;
            pullDistance = 0;
        }

        function attachPullToRefresh() {
            if (window.__mcPullAttached || !pullIndicator) return;
            window.addEventListener('touchstart', handleTouchStart, { passive: true });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleTouchEnd);
            window.__mcPullAttached = true;
        }

        function checkPassword() {
            const input = document.getElementById('pin-input').value;
            if (input === CONFIG.PIN) {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                sessionStorage.setItem('mc_authenticated', 'true');
                initDashboard();
            } else {
                document.getElementById('password-error').style.display = 'block';
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-input').focus();
            }
        }

        document.getElementById('pin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        setConnectionStatus(navigator.onLine ? 'online' : 'offline');
        window.addEventListener('online', () => setConnectionStatus('online'));
        window.addEventListener('offline', () => setConnectionStatus('offline'));

        if (sessionStorage.getItem('mc_authenticated') === 'true') {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            initDashboard();
        }

        function updateLastUpdatedTicker() {
            if (!lastUpdateTime) return;
            const now = new Date();
            const diffSecs = Math.floor((now - lastUpdateTime) / 1000);
            let text;
            if (diffSecs < 5) text = 'Just now';
            else if (diffSecs < 60) text = `${diffSecs}s ago`;
            else if (diffSecs < 3600) text = `${Math.floor(diffSecs / 60)}m ago`;
            else text = `${Math.floor(diffSecs / 3600)}h ago`;
            document.getElementById('last-updated-text').textContent = `Updated ${text}`;
        }

        async function fetchData() {
            try {
                const cacheBuster = `?_=${Date.now()}`;
                const response = await fetch(CONFIG.DATA_URL + cacheBuster);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                lastUpdateTime = new Date(data.lastUpdated || Date.now());
                renderDashboard(data);
                setConnectionStatus('online');
                document.getElementById('main-content').classList.add('flash-update');
                setTimeout(() => document.getElementById('main-content').classList.remove('flash-update'), 1000);
                return true;
            } catch (err) {
                console.error('Failed to fetch dashboard data:', err);
                setConnectionStatus(navigator.onLine ? 'degraded' : 'offline');
                return false;
            }
        }

        async function forceUpdate() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            await fetchData();
            setTimeout(() => btn.classList.remove('loading'), 500);
        }

        function initDashboard() {
            fetchData();
            updateLastUpdatedTicker();
            updateTickerInterval = setInterval(updateLastUpdatedTicker, 1000);
            setInterval(fetchData, CONFIG.REFRESH_INTERVAL);
            attachPullToRefresh();
        }

        function renderDashboard(data) {
            const now = new Date();

            // Action Required
            const actionBanner = document.getElementById('action-required');
            const actionItems = document.getElementById('action-items');
            if (data.actionRequired && data.actionRequired.length > 0) {
                actionBanner.classList.remove('empty');
                actionItems.innerHTML = data.actionRequired.map(item => `
                    <div class="alert-item">
                        <div class="alert-item-content">
                            <span class="priority ${item.priority}">${item.priority}</span>
                            <span>${escapeHtml(item.title)}</span>
                        </div>
                        ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Open →</a>` : ''}
                    </div>
                `).join('');
            } else {
                actionBanner.classList.add('empty');
            }

            // Stats Row
            const statsRow = document.getElementById('stats-row');
            const enabledCrons = data.crons?.filter(c => c.status !== 'paused').length || 0;
            const pausedCrons = data.crons?.filter(c => c.status === 'paused').length || 0;
            const errorCrons = data.crons?.filter(c => c.errors > 0).length || 0;
            statsRow.innerHTML = `
                <div class="stat-pill"><span class="num">${data.products?.length || 0}</span><span class="label">Products</span></div>
                <div class="stat-pill"><span class="num">${enabledCrons}</span><span class="label">Active Crons</span></div>
                <div class="stat-pill"><span class="num">${pausedCrons}</span><span class="label">Paused</span></div>
                ${errorCrons > 0 ? `<div class="stat-pill" style="border-color:var(--accent-red);"><span class="num" style="color:var(--accent-red);">${errorCrons}</span><span class="label">Errors</span></div>` : ''}
            `;

            // Brain Feed
            const brainFeedCard = document.getElementById('brain-feed-card');
            const percent = Math.max(0, Math.min(100, Math.round(((data.focus && data.focus.runway) || 0) * 100)));
            const feedItems = (data.recentActivity || []).slice(0, 6);
            const liveSignals = [
                data.modelUsage ? `Session ${formatCurrencyValue(data.modelUsage.session)}` : null,
                data.modelUsage ? `Daily ${formatCurrencyValue(data.modelUsage.daily)}` : null,
                (data.crons || []).length ? `${(data.crons || []).filter(c => c.status === 'ok').length} active crons` : null,
                (data.products || []).length ? `${(data.products || []).filter(p => p.status === 'live').length} live products` : null
            ].filter(Boolean);
            brainFeedCard.innerHTML = `
                <div class="brain-feed">
                    <div class="brain-hero">
                        <div class="brain-kicker">Live Operator State</div>
                        <div class="brain-title">${escapeHtml((data.focus && data.focus.status) || 'Mission Control Online')}</div>
                        <p class="focus-context">${escapeHtml((data.focus && data.focus.context) || 'No current context')}</p>
                        <div class="focus-meter">
                            <div class="focus-meter-bar"><span style="width:${percent}%"></span></div>
                            <span class="focus-meter-value">${percent}%</span>
                        </div>
                        <div class="brain-meta">
                            <span>${data.focus && data.focus.updatedAt ? `Updated ${formatTime(data.focus.updatedAt)}` : 'Awaiting refresh'}</span>
                            ${data.modelUsage && data.modelUsage.lastUpdated ? `<span>Telemetry ${formatTime(data.modelUsage.lastUpdated)}</span>` : ''}
                        </div>
                    </div>
                    <div class="brain-stream">
                        <div class="section-label">Recent Feed</div>
                        <div class="feed-list">
                            ${feedItems.length ? feedItems.map(item => `
                                <div class="feed-item">
                                    <div class="feed-time">${formatTime(item.time)}</div>
                                    <div class="feed-text">${escapeHtml(item.event)}</div>
                                </div>
                            `).join('') : '<div class="empty-state">No feed events yet</div>'}
                        </div>
                    </div>
                    <div class="brain-stream">
                        <div class="section-label">Signal Layer</div>
                        <div class="signal-strip">
                            ${liveSignals.length ? liveSignals.map(item => `<div class="signal-pill">${escapeHtml(item)}</div>`).join('') : '<div class="empty-state">No live signals yet</div>'}
                        </div>
                    </div>
                </div>
            `;

            // Model usage snapshot
            const modelUsageCard = document.getElementById('model-usage-card');
            if (data.modelUsage) {
                const totals = `
                    <div class="model-usage-grid">
                        <div class="model-pill"><h3>Session</h3><div class="value">${formatCurrencyValue(data.modelUsage.session)}</div></div>
                        <div class="model-pill"><h3>Daily</h3><div class="value">${formatCurrencyValue(data.modelUsage.daily)}</div></div>
                        <div class="model-pill"><h3>Weekly</h3><div class="value">${formatCurrencyValue(data.modelUsage.weekly)}</div></div>
                    </div>
                `;
                const top = (data.modelUsage.topModels && data.modelUsage.topModels.length) ? `
                    <div class="model-list">
                        ${data.modelUsage.topModels.map(model => `
                            <div class="model-row">
                                <span>${escapeHtml(model.name)}</span>
                                <span>${formatCurrencyValue(model.cost)}${model.window ? ` (${escapeHtml(model.window)})` : ''}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : '<div class="empty-state">No model calls yet</div>';
                const updated = data.modelUsage.lastUpdated ? `<div class="focus-updated">Updated ${formatTime(data.modelUsage.lastUpdated)}</div>` : '';
                modelUsageCard.innerHTML = totals + top + updated;
            } else {
                modelUsageCard.innerHTML = '<div class="empty-state">No telemetry yet</div>';
            }

            // Upcoming events
            const eventsList = document.getElementById('events-list');
            if (data.upcomingEvents && data.upcomingEvents.length > 0) {
                eventsList.innerHTML = data.upcomingEvents.slice(0, 4).map(event => `
                    <div class="event-item">
                        <div class="event-time">${formatEventTime(event.time)}</div>
                        <div class="event-detail">
                            <div>${escapeHtml(event.title)}</div>
                            <div class="event-source">${escapeHtml(event.source || '')}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                eventsList.innerHTML = '<div class="empty-state">No upcoming events</div>';
            }

            // Device & watchdog status
            const deviceList = document.getElementById('device-list');
            if (data.devices && data.devices.length > 0) {
                deviceList.innerHTML = data.devices.map(device => {
                    const statusClass = device.status === 'ok' ? 'ok' : device.status === 'error' ? 'error' : 'attention';
                    const statusLabel = device.status ? device.status.toUpperCase() : 'UNKNOWN';
                    return `
                        <div class="device-item">
                            <div class="device-name">${escapeHtml(device.name)}</div>
                            <div class="device-status ${statusClass}">${statusLabel}</div>
                            <p class="device-detail">${escapeHtml(device.detail || '')}</p>
                        </div>
                    `;
                }).join('');
            } else {
                deviceList.innerHTML = '<div class="empty-state">No device data</div>';
            }

            // Today's Jobs
            const todayJobsCard = document.getElementById('today-jobs-card');
            const cronRows = (data.crons || []).slice(0, 6).map(cron => {
                const chipClass = cron.status === 'ok' ? 'ok' : cron.status === 'paused' ? 'paused' : 'error';
                return `
                    <div class="job-row">
                        <div>
                            <div class="job-name">${escapeHtml(cron.name)}</div>
                            <div class="job-detail">${escapeHtml(cron.schedule || 'No schedule')}</div>
                        </div>
                        <div class="job-chip ${chipClass}">${escapeHtml(cron.status || 'unknown')}</div>
                    </div>
                `;
            }).join('');
            const eventRows = (data.upcomingEvents || []).slice(0, 4).map(event => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(event.title || 'Untitled event')}</div>
                        <div class="job-detail">${escapeHtml(event.source || '')}</div>
                    </div>
                    <div class="job-chip">${escapeHtml(formatEventTime(event.time))}</div>
                </div>
            `).join('');
            const actionRows = (data.actionRequired || []).slice(0, 4).map(item => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(item.title || 'Action')}</div>
                        <div class="job-detail">${escapeHtml(item.priority || 'queued')}</div>
                    </div>
                    <div class="job-chip error">${escapeHtml(item.priority || 'alert')}</div>
                </div>
            `).join('');
            todayJobsCard.innerHTML = `
                <div class="jobs-shell">
                    <div class="job-group">
                        <div class="job-group-title">Automation Queue</div>
                        ${cronRows || '<div class="empty-state">No scheduled jobs</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Calendar / Triggers</div>
                        ${eventRows || '<div class="empty-state">No upcoming events</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Action Required</div>
                        ${actionRows || '<div class="empty-state">Nothing urgent</div>'}
                    </div>
                </div>
            `;

            // Products
            const productsGrid = document.getElementById('products-grid');
            if (data.products && data.products.length > 0) {
                productsGrid.innerHTML = data.products.map(product => `
                    <a href="${escapeHtml(product.url)}" target="_blank" rel="noopener" class="product-card">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                        <div class="product-status ${product.status}">
                            <span class="dot"></span>
                            ${product.status.charAt(0).toUpperCase() + product.status.slice(1)}
                        </div>
                        <div class="product-checked">Checked ${formatTime(product.lastChecked)}</div>
                    </a>
                `).join('');
            } else {
                productsGrid.innerHTML = '<div class="empty-state">No products configured</div>';
            }

            // Cron Jobs
            const cronTable = document.getElementById('cron-table');
            if (data.crons && data.crons.length > 0) {
                const sortedCrons = [...data.crons].sort((a, b) => {
                    if (a.errors > 0 && b.errors === 0) return -1;
                    if (b.errors > 0 && a.errors === 0) return 1;
                    if (a.status === 'paused' && b.status !== 'paused') return 1;
                    if (b.status === 'paused' && a.status !== 'paused') return -1;
                    return 0;
                });
                cronTable.innerHTML = sortedCrons.map(cron => {
                    const statusIcon = cron.status === 'ok' ? '✅' : cron.status === 'error' ? '❌' : cron.status === 'paused' ? '⏸️' : '⚪';
                    return `
                        <div class="cron-row ${cron.errors > 0 ? 'has-error' : ''}" onclick="this.classList.toggle('expanded')">
                            <div>
                                <div class="cron-name">${escapeHtml(cron.name)}</div>
                                <div class="cron-schedule">${escapeHtml(cron.schedule)}</div>
                            </div>
                            <div class="cron-status">${statusIcon}</div>
                            ${cron.errors > 0 ? `<div class="cron-errors">${cron.errors} errors</div>` : ''}
                            ${cron.lastError ? `<div class="cron-error-detail">${escapeHtml(cron.lastError)}</div>` : ''}
                        </div>
                    `;
                }).join('');
            } else {
                cronTable.innerHTML = '<div class="empty-state">No cron jobs configured</div>';
            }

        }

        function formatTime(isoString) {
            if (!isoString) return 'never';
            const date = new Date(isoString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffMins < 1440) return `${Math.floor(diffMins / 60)}h ago`;
            return date.toLocaleDateString();
        }

        function formatCurrencyValue(value) {
            if (typeof value !== 'number') return '$0.00';
            if (value === 0) return '$0.00';
            if (value < 1) return `${(value * 100).toFixed(2)}¢`;
            return `$${value.toFixed(2)}`;
        }

        function formatEventTime(isoString) {
            if (!isoString) return 'TBD';
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) return isoString;
            const day = date.toLocaleDateString(undefined, { weekday: 'short' });
            const time = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            return `${day} ${time}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => {
                    console.error('Service worker registration failed', err);
                });
            });
        }
    </script>
</body>
</html>
