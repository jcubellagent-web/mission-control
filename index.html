        // ===== Intelligence Feed =====
        let lastIntelHash = null;

        async function fetchIntelligenceFeed() {
            try {
                const r = await fetch('./data/newsfeed.json?_=' + Date.now());
                if (!r.ok) return;
                const feed = await r.json();
                const hash = JSON.stringify(feed.generatedAt);
                if (hash === lastIntelHash) return;
                lastIntelHash = hash;
                renderTicker(feed);
                renderIntelligenceFeed(feed);
            } catch(e) {}
        }

        // Shared English-only guard (>80% ASCII chars)
        function isEnglish(text) {
            if (!text) return false;
            const ascii = [...text].filter(c => c.charCodeAt(0) < 128).length;
            return ascii / text.length > 0.8;
        }

        function renderTicker(f) {
            const track = document.getElementById('intel-ticker-track');
            if (!track) return;
            const items = [];

            // Market summary: SPY, QQQ, BTC
            const ms = f.market_summary || {};
            function tickerMkt(sym, d) {
                if (!d) return null;
                const up = d.change_pct >= 0;
                const sign = up ? '+' : '';
                return `<span class="intel-ticker-item">
                    <span class="t-sym">${sym}</span>
                    <span class="t-price">$${typeof d.price === 'number' && d.price > 1000 ? d.price.toLocaleString() : d.price}</span>
                    <span class="t-chg ${up ? 'up' : 'down'}">${sign}${d.change_pct.toFixed(2)}%</span>
                </span>`;
            }
            if (ms.spy) items.push(tickerMkt('SPY', ms.spy));
            if (ms.qqq) items.push(tickerMkt('QQQ', ms.qqq));
            if (ms.btc) items.push(tickerMkt('BTC', ms.btc));

            // Fear & Greed
            if (f.fear_greed) {
                const fg = f.fear_greed;
                const fgColor = fg.value < 30 ? '#f87171' : fg.value < 50 ? '#fb923c' : fg.value < 65 ? '#facc15' : '#4ade80';
                items.push(`<span class="intel-ticker-item">
                    <span class="t-sym">F&amp;G</span>
                    <span class="t-chg" style="color:${fgColor}">${fg.value} ${escapeHtml(fg.label || '')}</span>
                </span>`);
            }

            // VIX
            if (f.macro_context && f.macro_context.vix) {
                const vix = f.macro_context.vix;
                const vixColor = vix >= 30 ? '#f87171' : vix >= 20 ? '#fb923c' : 'rgba(255,255,255,0.6)';
                items.push(`<span class="intel-ticker-item">
                    <span class="t-sym">VIX</span>
                    <span class="t-price" style="color:${vixColor}">${vix.toFixed(1)}</span>
                </span>`);
            }

            // Top signal headlines (highest scored, max 5, English only)
            const signals = (f.signal || []).filter(s => isEnglish(s.title)).slice(0, 5);
            signals.forEach(s => {
                if (!s.title) return;
                const title = s.title.length > 70 ? s.title.slice(0, 68) + '…' : s.title;
                items.push(`<span class="intel-ticker-item headline">${escapeHtml(title)}</span>`);
            });

            // NASDAQ top mover
            const gainers = (f.nasdaq_movers?.gainers || []).slice(0, 2);
            const losers  = (f.nasdaq_movers?.losers  || []).slice(0, 2);
            [...gainers, ...losers].forEach(m => {
                const up = m.change_pct >= 0;
                items.push(`<span class="intel-ticker-item">
                    <span class="t-sym">${m.ticker}</span>
                    <span class="t-price">$${m.price}</span>
                    <span class="t-chg ${up ? 'up' : 'down'}">${up ? '+' : ''}${m.change_pct}%</span>
                </span>`);
            });

            if (items.length === 0) return;
            // Double the items so the loop is seamless
            const html = items.join('') + items.join('');
            track.innerHTML = html;
            // Adjust animation speed based on content width
            const totalW = track.scrollWidth / 2;
            const speed = Math.max(25, Math.min(80, totalW / 8));
            track.style.animationDuration = speed + 's';
        }

        function renderIntelligenceFeed(f) {
            const el = document.getElementById('intelligence-feed-card');
            if (!el) return;
            let html = '';

            // Fear & Greed
            if (f.fear_greed) {
                const fg = f.fear_greed;
                const fgClass = fg.value < 40 ? 'fear' : fg.value > 60 ? 'greed' : '';
                html += `<div class="if-section">
                    <div class="if-section-header">Fear &amp; Greed</div>
                    <div class="fg-bar-wrap">
                        <div class="fg-bar">${escapeHtml(fg.bar || '')} <span style="color:rgba(255,255,255,0.6)">${fg.value} — ${escapeHtml(fg.label || '')}</span></div>
                        <div class="fg-meta">
                            ${fg.btc_dominance ? `<span class="fg-pill">BTC Dom ${fg.btc_dominance}%</span>` : ''}
                            ${fg.market_cap_change_24h != null ? `<span class="fg-pill ${fg.market_cap_change_24h < 0 ? 'fear' : 'greed'}">Mkt 24h ${fg.market_cap_change_24h > 0 ? '+' : ''}${fg.market_cap_change_24h}%</span>` : ''}
                        </div>
                    </div>
                </div>`;
            }

            // Signal
            if (f.signal && f.signal.length) {
                html += `<div class="if-section"><div class="if-section-header">🎯 Top Signal, Developments &amp; TLDR</div>`;
                f.signal.filter(i => isEnglish(i.title)).slice(0,5).forEach(item => {
                    html += `<div class="if-item">
                        <div class="if-item-title"><span class="if-score">${item.score?.toFixed(0) || ''}</span>${escapeHtml(item.title || '')}</div>
                        <div class="if-item-meta">${escapeHtml(item.source || '')}</div>
                    </div>`;
                });
                if (f.tldr && f.tldr.length) {
                    html += `<div class="if-tldr-block">`;
                    f.tldr.forEach(b => {
                        html += `<div class="if-tldr-bullet">› ${escapeHtml(b)}</div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            }

            // AI Value Chain
            if (f.ai_value_chain && f.ai_value_chain.length) {
                html += `<div class="if-section"><div class="if-section-header">🔗 AI Value Chain</div>`;

        let _nightClockTimer = null;

        function enterNightMode() {
            const overlay = document.getElementById('night-mode-overlay');
            overlay.style.display = 'flex';
            updateNightClock();
            _nightClockTimer = setInterval(updateNightClock, 1000);
            overlay.addEventListener('click', exitNightMode, { once: true });
            // Notify local server so phone knows we're in night mode

        function exitNightMode() {
            const overlay = document.getElementById('night-mode-overlay');
            overlay.style.display = 'none';
            clearInterval(_nightClockTimer);
            fetch('http://localhost:8765/nightmode/off', { method: 'POST' }).catch(() => {});
        }

        function updateNightClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
            const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            const clock = document.getElementById('night-clock');
            const date  = document.getElementById('night-date');
            if (clock) clock.textContent = `${h}:${m}:${s}`;
            if (date)  date.textContent  = `${days[now.getDay()]}  ${months[now.getMonth()]} ${now.getDate()}  ${now.getFullYear()}`;
        }

        // Poll for night mode activation from phone
        setInterval(async () => {
            try {
                const r = await fetch('http://localhost:8765/nightmode/state?_=' + Date.now(), { signal: AbortSignal.timeout(500) });
                if (!r.ok) return;
                const s = await r.json();
                const overlay = document.getElementById('night-mode-overlay');
                const isShowing = overlay && overlay.style.display !== 'none';
                if (s.nightMode && !isShowing) enterNightMode();
                if (!s.nightMode && isShowing) exitNightMode();
            } catch {}
        }, 1500);

        // ── Supabase Realtime brain feed subscription ──────────────────────────
        let _sbWs = null;
        let _sbHeartbeatTimer = null;
        let _sbReconnectTimer = null;

        function initSupabaseRealtime() {
            if (_sbWs && (_sbWs.readyState === WebSocket.OPEN || _sbWs.readyState === WebSocket.CONNECTING)) return;
            const wsUrl = CONFIG.SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + CONFIG.SUPABASE_KEY + '&vsn=1.0.0';
            try {
                _sbWs = new WebSocket(wsUrl);
            } catch(e) { return; }

            _sbWs.onopen = () => {
                console.debug('[MC] Supabase Realtime connected');
                // Join channel for brain_feed table
                _sbWs.send(JSON.stringify({
                    topic: 'realtime:public:brain_feed',
                    event: 'phx_join',
                    payload: { config: { broadcast: { self: true }, presence: { key: '' } } },
                    ref: '1'
                }));
                // Heartbeat every 25s
                _sbHeartbeatTimer = setInterval(() => {
                    if (_sbWs.readyState === WebSocket.OPEN) {
                        _sbWs.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: 'hb' }));
                    }
                }, 25000);
            };

            _sbWs.onmessage = (evt) => {
                try {
                    const msg = JSON.parse(evt.data);
                    if (msg.event === 'postgres_changes' || (msg.event === 'INSERT' || msg.event === 'UPDATE')) {
                        const record = msg.payload?.data?.record || msg.payload?.record;
                        if (record?.data) {
                            console.debug('[MC] Supabase RT brain feed update');
                            const bf = record.data;
                            const newHash = JSON.stringify(bf);
                            if (newHash === lastBrainFeedHash) return;
                            lastBrainFeedHash = newHash;
                            bfLastUpdatedTs = Date.now();
                            renderBrainFeed(bf);
                            updateBfFreshness(bf);
                        }
                    }
                } catch(e) {}
            };

            _sbWs.onerror = () => { console.debug('[MC] Supabase RT error'); };
            _sbWs.onclose = () => {
                console.debug('[MC] Supabase RT disconnected — reconnecting in 5s');
                clearInterval(_sbHeartbeatTimer);
                clearTimeout(_sbReconnectTimer);
                _sbReconnectTimer = setTimeout(initSupabaseRealtime, 5000);
            };
        }

        // Also do a direct REST poll as fallback when RT is up
        async function fetchBrainFeedSupabase() {
            try {
                const r = await fetch(CONFIG.SUPABASE_URL + '/rest/v1/brain_feed?id=eq.main&select=data,updated_at', {
                    headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': 'Bearer ' + CONFIG.SUPABASE_KEY }
                });
                if (!r.ok) return;
                const rows = await r.json();
                if (!rows || !rows[0]?.data) return;
                const bf = rows[0].data;
                const newHash = JSON.stringify(bf);
                if (newHash === lastBrainFeedHash) return;
                lastBrainFeedHash = newHash;
                bfLastUpdatedTs = Date.now();
                renderBrainFeed(bf);
                updateBfFreshness(bf);
            } catch(e) {}
        }

        function toolPillClass(tool) {
            if (!tool) return 'tool-default';

            if (t === 'read' || t === 'write' || t === 'edit') return 'tool-read';
            if (t === 'image' || t === 'image_generate') return 'tool-image';
            if (t.includes('claude') || t.includes('sonnet') || t.includes('gpt') || t.includes('gemini')) return 'tool-claude';
            if (t === 'git' || t === 'github') return 'tool-git';
            if (t === 'exec' || t === 'process') return 'tool-exec';

        }

        function renderBrainFeed(bf) {
            const brainFeedCard = document.getElementById('brain-feed-card');
            if (!brainFeedCard) return;
            window._mcLastBrainFeed = bf || null;
            // State transition detection
            const newState = (bf && bf.active) ? 'active' : (bf && bf.status === 'done') ? 'done' : 'idle';
            const isWakingUp = (_prevBfState === 'idle' || _prevBfState === 'done') && newState === 'active';
            const isCompleting = _prevBfState === 'active' && (newState === 'done' || newState === 'idle');
            const objectiveChanged = bf && bf.objective && bf.objective !== _lastBfObjective;
            const isReceivingMsg = bf && bf.objective && bf.objective.toLowerCase().startsWith('received:');
            const brainCard = brainFeedCard.closest('.card-brain');
            const kioskMode = isKioskMode();
            const phoneMode = isPhoneMode();
            const stateLabel = getBrainFeedStateLabel(bf);

            // Freshness strip HTML (always present)
            const freshnessStrip = `<div class="bf-freshness-row">
                <span class="bf-fresh-dot" style="background:rgba(255,255,255,0.2)"></span>
                <span class="bf-freshness-label" id="bf-freshness-label-text">${stateLabel}</span>
                <span id="bf-last-updated">${bf && bf.updatedAt ? formatTime(bf.updatedAt) : '-'}</span>
            </div>`;

            if (bf && bf.active) {
                brainCard.classList.add('brain-active');
                document.body.classList.toggle('edge-laser-on', phoneMode);
                const msgTime = bf.messageReceived ? formatAbsoluteTime(bf.messageReceived) : '';
                const updatedTime = bf.updatedAt ? formatTime(bf.updatedAt) : '';

                // ── Smart in-place update (no full innerHTML replace on updates) ──
                let bfCont = brainFeedCard.querySelector('.bf-container');

                if (!bfCont || isWakingUp) {
                    // Full render only on wake-up or first render
                    const stepsHtml = [...(bf.steps || [])].reverse().map(step => {
                        const stepClass = step.status === 'done' ? 'done-step' : step.status === 'active' ? 'active-step' : 'pending-step';
                        const iconClass = step.status === 'done' ? 'done' : step.status === 'active' ? 'active' : 'pending';
                        const iconChar = step.status === 'done' ? '✓' : step.status === 'active' ? '●' : '○';
                        const toolHtml = step.tool ? `<span class="bf-tool-pill ${toolPillClass(step.tool)}">${escapeHtml(step.tool)}</span>` : '';
                        return `<div class="bf-step ${stepClass}" data-label="${escapeHtml(step.label)}">
                            <div class="bf-step-icon ${iconClass}">${iconChar}</div>
                            <div class="bf-step-body">
                                <div class="bf-step-label">${escapeHtml(step.label)}</div>
                                ${toolHtml}
                            </div>
                        </div>`;
                    }).join('');
                    brainFeedCard.innerHTML = `
                        ${freshnessStrip}
                        <div class="bf-container">
                            <div class="bf-msg-banner">
                                <span class="bf-msg-dot"></span>
                                <span class="bf-msg-label">Message Received</span>
                                <span class="bf-msg-time">${escapeHtml(msgTime)}</span>
                            </div>
                            <div class="bf-objective">
                                <div class="bf-objective-kicker">Current Objective</div>
                                <div class="bf-objective-text">${escapeHtml(bf.objective || 'Processing...')}</div>
                            </div>
                            ${bf.currentTool ? `
                            <div class="bf-current-tool-bar">
                                <span class="bf-ct-pulse"></span>
                                <span class="bf-ct-label">Active tool</span>
                                <span class="bf-ct-tool">${escapeHtml(bf.currentTool)}</span>
                                ${updatedTime ? `<span class="bf-msg-time" style="margin-left:auto">${escapeHtml(updatedTime)}</span>` : ''}
                            </div>` : ''}
                            <div class="bf-timeline">${stepsHtml || '<div class="empty-state">No steps yet</div>'}</div>
                        </div>
                    `;
                    bfCont = brainFeedCard.querySelector('.bf-container');

                    // Wake-up animation
                    if (isWakingUp && bfCont) {
                        bfCont.classList.add('bf-waking');
                        bfCont.addEventListener('animationend', () => bfCont.classList.remove('bf-waking'), { once: true });
                    }
                } else {
                    // ── Smooth in-place diff updates ────────────────────────────
                    // 1. Update freshness strip
                    const fr = brainFeedCard.querySelector('.bf-freshness-row');
                    if (fr) {
                        const lbl = fr.querySelector('#bf-freshness-label-text');
                        const ts = fr.querySelector('#bf-last-updated');
                        if (lbl) lbl.textContent = stateLabel;
                        if (ts) ts.textContent = bf.updatedAt ? formatTime(bf.updatedAt) : '-';
                    }

                    // 2. Crossfade objective text if changed
                    if (objectiveChanged) {
                        const objEl = brainFeedCard.querySelector('.bf-objective-text');
                        if (objEl) {
                            objEl.style.transition = 'opacity 0.18s ease, transform 0.22s ease';
                            objEl.style.opacity = '0';
                            objEl.style.transform = 'translateY(4px)';
                            setTimeout(() => {
                                objEl.textContent = bf.objective || 'Processing...';
                                objEl.style.opacity = '1';
                                objEl.style.transform = 'translateY(0)';
                            }, 200);
                        }
                    }

                    // 3. Update tool bar smoothly
                    let toolBar = brainFeedCard.querySelector('.bf-current-tool-bar');
                    if (bf.currentTool) {
                        if (!toolBar) {
                            // Insert before timeline
                            const timeline = brainFeedCard.querySelector('.bf-timeline');
                            toolBar = document.createElement('div');
                            toolBar.className = 'bf-current-tool-bar';
                            toolBar.style.opacity = '0';
                            toolBar.style.transition = 'opacity 0.25s ease';
                            toolBar.innerHTML = `<span class="bf-ct-pulse"></span><span class="bf-ct-label">Active tool</span><span class="bf-ct-tool">${escapeHtml(bf.currentTool)}</span>`;
                            if (timeline) timeline.before(toolBar);
                            requestAnimationFrame(() => { toolBar.style.opacity = '1'; });
                        } else {
                            const ctEl = toolBar.querySelector('.bf-ct-tool');
                            if (ctEl && ctEl.textContent !== bf.currentTool) {
                                ctEl.style.transition = 'opacity 0.15s ease';
                                ctEl.style.opacity = '0';
                                setTimeout(() => { ctEl.textContent = bf.currentTool; ctEl.style.opacity = '1'; }, 160);
                            }
                        }
                    } else if (toolBar) {
                        toolBar.style.transition = 'opacity 0.25s ease';
                        toolBar.style.opacity = '0';
                        setTimeout(() => toolBar.remove(), 280);
                    }

                    // 4. Diff-update steps — animate step status changes, slide in new steps
                    const timeline = brainFeedCard.querySelector('.bf-timeline');
                    if (timeline) {
                        const existingSteps = {};
                        timeline.querySelectorAll('.bf-step[data-label]').forEach(el => {
                            existingSteps[el.dataset.label] = el;
                        });
                        const orderedSteps = [...(bf.steps || [])].reverse();
                        orderedSteps.forEach((step, i) => {
                            const stepClass = step.status === 'done' ? 'done-step' : step.status === 'active' ? 'active-step' : 'pending-step';
                            const iconClass = step.status === 'done' ? 'done' : step.status === 'active' ? 'active' : 'pending';
                            const iconChar = step.status === 'done' ? '✓' : step.status === 'active' ? '●' : '○';
                            const toolHtml = step.tool ? `<span class="bf-tool-pill ${toolPillClass(step.tool)}">${escapeHtml(step.tool)}</span>` : '';

                            if (existingSteps[step.label]) {
                                // Update existing step status smoothly
                                const el = existingSteps[step.label];
                                if (!el.classList.contains(stepClass)) {
                                    el.style.transition = 'background 0.3s ease, opacity 0.2s ease';
                                    el.className = `bf-step ${stepClass}`;
                                    const icon = el.querySelector('.bf-step-icon');
                                    if (icon) {
                                        icon.className = `bf-step-icon ${iconClass}`;
                                        icon.textContent = iconChar;
                                        if (iconClass === 'done') {
                                            icon.style.transform = 'scale(1.3)';
                                            setTimeout(() => { icon.style.transition = 'transform 0.2s ease'; icon.style.transform = 'scale(1)'; }, 50);
                                        }
                                        if (iconClass === 'active') icon.classList.add('bf-ring');
                                        else icon.classList.remove('bf-ring');
                                    }
                                }
                                delete existingSteps[step.label];
                            } else {
                                // New step — slide in
                                const el = document.createElement('div');
                                el.className = `bf-step ${stepClass}`;
                                el.dataset.label = step.label;
                                el.innerHTML = `<div class="bf-step-icon ${iconClass}">${iconChar}</div>
                                    <div class="bf-step-body"><div class="bf-step-label">${escapeHtml(step.label)}</div>${toolHtml}</div>`;
                                el.style.opacity = '0';
                                el.style.transform = 'translateX(-12px)';
                                el.style.transition = 'opacity 0.3s ease, transform 0.35s cubic-bezier(0.16,1,0.3,1)';
                                // Insert at correct position
                                const children = Array.from(timeline.querySelectorAll('.bf-step'));
                                if (i < children.length) timeline.insertBefore(el, children[i]);
                                else timeline.appendChild(el);
                                requestAnimationFrame(() => requestAnimationFrame(() => {
                                    el.style.opacity = '1';
                                    el.style.transform = 'translateX(0)';
                                    if (iconClass === 'active') el.querySelector('.bf-step-icon')?.classList.add('bf-ring');
                                }));
                            }
                        });
                        // Remove orphaned steps with fade-out
                        Object.values(existingSteps).forEach(el => {
                            el.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                            el.style.opacity = '0';
                            el.style.transform = 'translateX(8px)';
                            setTimeout(() => el.remove(), 220);
                        });
                    }
                }

                // Message received banner flash + scan line
                if (isReceivingMsg || isWakingUp) {
                    const banner = brainFeedCard.querySelector('.bf-msg-banner');
                    if (banner) {
                        banner.classList.remove('bf-banner-flash');
                        void banner.offsetWidth;
                        banner.classList.add('bf-banner-flash');
                        let scanEl = banner.querySelector('.bf-scan-line');
                        if (!scanEl) { scanEl = document.createElement('div'); scanEl.className = 'bf-scan-line'; banner.appendChild(scanEl); }
                        const dot = banner.querySelector('.bf-msg-dot');
                        if (dot) { dot.classList.add('bf-dot-recv'); setTimeout(() => dot.classList.remove('bf-dot-recv'), 2000); }
                    }
                }
                // Objective text reveal (first render only, updates handled by diff above)
                if (objectiveChanged && isWakingUp) {
                    const objText = brainFeedCard.querySelector('.bf-objective-text');
                    if (objText) {
                        objText.classList.remove('bf-obj-revealing');
                        void objText.offsetWidth;
                        objText.classList.add('bf-obj-revealing');
                        objText.addEventListener('animationend', () => objText.classList.remove('bf-obj-revealing'), { once: true });
                    }
                    _lastBfObjective = bf.objective;
                } else if (objectiveChanged) {
                    _lastBfObjective = bf.objective;
                }
            } else {
                // Done flash when transitioning active -> done/idle
                if (isCompleting) {
                    brainCard.classList.add('bf-done-flash');
                    brainCard.addEventListener('animationend', () => brainCard.classList.remove('bf-done-flash'), { once: true });
                    if (_bfDoneBannerTimer) clearTimeout(_bfDoneBannerTimer);
                    const doneBanner = document.createElement('div');
                    doneBanner.className = 'bf-done-success-banner';
                    doneBanner.innerHTML = '<span>✓</span><span>Response sent</span>';
                    brainFeedCard.prepend(doneBanner);
                    _bfDoneBannerTimer = setTimeout(() => {
                        doneBanner.classList.add('fading-out');
                        doneBanner.addEventListener('animationend', () => doneBanner.remove(), { once: true });
                    }, 2000);
                }
                brainCard.classList.remove('brain-active');
                document.body.classList.remove('edge-laser-on');
                // Use cached focus/activity data if available
                const focusData = window._mcLastFocus;
                const activityData = window._mcLastActivity;
                const modelUsageData = window._mcLastModelUsage;
                const cronsData = window._mcLastCrons;
                const productsData = window._mcLastProducts;
                const ctxWin = window._mcLastContextWindow || null;
                const feedItems = (activityData || []).slice(0, kioskMode ? 4 : phoneMode ? 4 : 6);
                const liveSignals = [
                    modelUsageData ? `Session ${formatCurrencyAlways(modelUsageData.session)}` : null,
                    modelUsageData ? `Daily ${formatCurrencyAlways(modelUsageData.daily)}` : null,
                    (cronsData || []).length ? `${(cronsData || []).filter(c => c.status === 'ok').length} active crons` : null,
                    (productsData || []).length ? `${(productsData || []).filter(p => p.status === 'live').length} live products` : null
                ].filter(Boolean);

                // Context window meter
                let ctxMeterHtml = '';
                if (ctxWin && ctxWin.limitTokens > 0) {
                    const pct = Math.round((ctxWin.pct || 0) * 100);
                    const usedK = Math.round((ctxWin.usedTokens || 0) / 1000);
                    const limK = Math.round((ctxWin.limitTokens || 0) / 1000);
                    const ragStatus = ctxWin.status || 'green';
                    const barColor = ragStatus === 'red' ? '#e53e3e' : ragStatus === 'amber' ? '#fbbf24' : '#4ade80';
                    const statusLabel = ragStatus === 'red' ? '⚠ New session recommended' : ragStatus === 'amber' ? '· Consider /new soon' : '· Plenty of room';
                    const statusColor = ragStatus === 'red' ? '#e53e3e' : ragStatus === 'amber' ? '#fbbf24' : 'var(--text-muted)';
                    ctxMeterHtml = `
                        <div class="ctx-meter-wrap">
                            <div class="ctx-meter-header">
                                <span class="ctx-meter-label">Context Window</span>
                                <span class="ctx-meter-pct" style="color:${barColor}">${pct}%</span>
                                <span class="ctx-meter-hint" style="color:${statusColor}">${statusLabel}</span>
                            </div>
                            <div class="focus-meter">
                                <div class="focus-meter-bar"><span style="width:${pct}%;background:${barColor};transition:width 0.6s ease,background 0.4s"></span></div>
                            </div>
                            <div class="ctx-meter-sub">${usedK}K / ${limK}K tokens · ${escapeHtml(ctxWin.model || 'unknown model')}</div>
                        </div>`;
                }

                brainFeedCard.innerHTML = `
                    ${freshnessStrip}
                    <div class="bf-idle-container brain-feed">
                        <div class="brain-hero">
                            <div class="brain-kicker">Live Operator State</div>
                            <div class="brain-title">${escapeHtml((focusData && focusData.status) || 'Mission Control Online')}</div>
                            <p class="focus-context">${escapeHtml((focusData && focusData.context) || 'No current context')}</p>
                            ${ctxMeterHtml}
                            <div class="brain-meta">
                                <span>${focusData && focusData.updatedAt ? `Updated ${formatTime(focusData.updatedAt)}` : 'Awaiting refresh'}</span>
                                ${modelUsageData && modelUsageData.lastUpdated ? `<span>Telemetry ${formatTime(modelUsageData.lastUpdated)}</span>` : ''}
                            </div>
                        </div>
                        <div class="brain-stream">
                            <div class="section-label">Recent Feed</div>
                            <div class="feed-list">
                                ${feedItems.length ? feedItems.map(item => `
                                    <div class="feed-item">
                                        <div class="feed-time">${formatTime(item.time)}</div>
                                        <div class="feed-text">${escapeHtml(item.event)}</div>
                                    </div>
                                `).join('') : '<div class="empty-state">No feed events yet</div>'}
                            </div>
                        </div>
                        <div class="brain-stream">
                            <div class="section-label">Signal Layer</div>
                            <div class="signal-strip">
                                ${liveSignals.length ? liveSignals.map(item => `<div class="signal-pill">${escapeHtml(item)}</div>`).join('') : '<div class="empty-state">No live signals yet</div>'}
                            </div>
                        </div>
                    </div>
                `;
            }
            // After DOM update, reapply freshness dot state
            if (bfLastUpdatedTs) updateBfFreshness(bf);
            // Always update J.A.I.N status bar after JOSH renders
            renderCombinedBrainFeed(bf, _jainBrainFeed);
            // Track state for next transition
            _prevBfState = newState;
        }

        // ===== Section-level diff helpers =====
        function sectionChanged(key, newData) {
            const h = JSON.stringify(newData);
            if (lastDashboardHash[key] === h) return false;
            lastDashboardHash[key] = h;
            return true;
        }

        function renderDashboard(data) {
            const now = new Date();
            const kioskMode = isKioskMode();
            const phoneMode = isPhoneMode();
            const compactMode = kioskMode || phoneMode;

            // Cache context data for idle brain feed renderer
            window._mcLastFocus = data.focus;
            window._mcLastActivity = data.recentActivity;
            window._mcLastModelUsage = data.modelUsage;
            updateMobileCostPill(data.modelUsage);
            window._mcLastCrons = data.crons;
            window._mcLastProducts = data.products;
            window._mcLastContextWindow = data.contextWindow || null;

            // Brain Feed - Supabase is the source of truth for live state.
            // Only render from dashboard-data.json if Supabase has NOT given us fresher data.
            const sbBf = window._mcLastBrainFeed; // set by fetchBrainFeedSupabase
            const dashBf = data.brainFeed;
            // Use Supabase data if it's newer OR if agent is active
            const shouldUseDash = !sbBf || (
                dashBf &&
                !sbBf.active &&
                new Date(dashBf.updatedAt || 0) > new Date(sbBf.updatedAt || 0)
            );
            if (shouldUseDash && sectionChanged('brainFeed', dashBf)) {
                renderBrainFeed(dashBf);
                if (dashBf) {
                    bfLastUpdatedTs = dashBf.updatedAt ? new Date(dashBf.updatedAt).getTime() : null;
                    updateBfFreshness(dashBf);
                }
            }

            // Action Required (diff-guarded)
            if (!sectionChanged('actionRequired', data.actionRequired)) { /* skip */ } else
            { const actionBanner = document.getElementById('action-required');
            const actionItems = document.getElementById('action-items');
            if (data.actionRequired && data.actionRequired.length > 0) {
                actionBanner.classList.remove('empty');
                actionItems.innerHTML = data.actionRequired.map(item => `
                    <div class="alert-item">
                        <div class="alert-item-content">
                            <span class="priority ${item.priority}">${item.priority}</span>
                            <span>${escapeHtml(item.title)}</span>
                        </div>
                        ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Open →</a>` : ''}
                    </div>
                `).join('');
            } else {
                actionBanner.classList.add('empty');
            } }

            // Stats Row (diff-guarded)
            const statsRow = document.getElementById('stats-row');
            const enabledCrons = data.crons?.filter(c => c.status !== 'paused').length || 0;
            const pausedCrons = data.crons?.filter(c => c.status === 'paused').length || 0;
            const errorCrons = data.crons?.filter(c => c.errors > 0).length || 0;
            const upcomingCount = data.upcomingEvents?.length || 0;
            const deviceAttention = data.devices?.filter(d => d.status && d.status !== 'ok').length || 0;
            statsRow.innerHTML = `
                <div class="stat-pill"><span class="num">${enabledCrons}</span><span class="label">Active Crons</span></div>
                <div class="stat-pill"><span class="num">${pausedCrons}</span><span class="label">Paused</span></div>
                <div class="stat-pill"><span class="num">${upcomingCount}</span><span class="label">Upcoming</span></div>
                <div class="stat-pill"><span class="num">${deviceAttention}</span><span class="label">Device Alerts</span></div>
                ${errorCrons > 0 ? `<div class="stat-pill" style="border-color:var(--accent-red);"><span class="num" style="color:var(--accent-red);">${errorCrons}</span><span class="label">Cron Errors</span></div>` : ''}
            `;


            // Model usage snapshot - redesigned (diff-guarded)
            if (sectionChanged('modelUsage', data.modelUsage)) {
            const modelUsageCard = document.getElementById('model-usage-card');
            if (data.modelUsage) {
                const mu = data.modelUsage;
                const updatedStr = mu.lastUpdated ? formatTime(mu.lastUpdated) : null;
                // Update card header to show timestamp on right
                const muHeader = modelUsageCard.closest('.card')?.querySelector('.card-header h2');
                if (muHeader && updatedStr) {
                    if (!muHeader.parentElement.querySelector('.mu-header-ts')) {
                        const ts = document.createElement('span');
                        ts.className = 'mu-updated mu-header-ts';
                        ts.style.marginLeft = 'auto';
                        muHeader.parentElement.appendChild(ts);
                    }
                    const tsEl = muHeader.parentElement.querySelector('.mu-header-ts');
                    if (tsEl) tsEl.textContent = updatedStr;
                }
                const summaryHtml = `
                    <div class="mu-summary-row">
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Session</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.session)}</div>
                        </div>
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Daily</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.daily)}</div>
                        </div>
                        <div class="mu-summary-cell">
                            <div class="mu-summary-label">Weekly</div>
                            <div class="mu-summary-value">${formatCurrencyAlways(mu.weekly)}</div>
                        </div>
                    </div>
                `;
                let breakdownHtml = '<div class="empty-state">No model calls yet</div>';
                if (mu.breakdown && mu.breakdown.length) {
                    // Sort by weekly cost desc (best proxy for total)
                    const sorted = [...mu.breakdown].sort((a, b) => (b.weeklyCost || 0) - (a.weeklyCost || 0));
                    const maxCost = sorted.reduce((m, x) => Math.max(m, x.weeklyCost || 0), 0) || 1;
                    // Generate a color per model
                    const palette = ['#e53e3e','#63b3ed','#9a75f5','#f97316','#4ade80','#fbbf24'];
                    breakdownHtml = `<div class="mu-model-list">${sorted.map((model, i) => {
                        const total = model.weeklyCost || 0;
                        const pct = Math.max(2, (total / maxCost) * 100).toFixed(1);
                        const color = palette[i % palette.length];
                        const src = (model.source || '').toLowerCase();
                        const srcClass = src.includes('openrouter') ? 'openrouter' : src.includes('codex') ? 'codexbar' : src.includes('openclaw') ? 'openclaw' : 'other';
                        const srcLabel = model.source || 'Unknown';
                        return `<div class="mu-model-item">
                            <div class="mu-model-top">
                                <div class="mu-model-name-group">
                                    <span class="mu-model-dot" style="background:${color}"></span>
                                    <span class="mu-model-name" title="${escapeHtml(model.name)}">${escapeHtml(model.name)}</span>
                                    <span class="mu-source-tag ${srcClass}">${escapeHtml(srcLabel)}</span>
                                </div>
                                <span class="mu-model-total">${formatCurrencyAlways(total)}</span>
                            </div>
                            <div class="mu-model-bar-wrap">
                                <div class="mu-model-bar-fill" style="width:${pct}%;background:${color};opacity:0.85"></div>
                            </div>
                            <div class="mu-model-breakdown-row">
                                <span class="mu-bd-cell"><span class="mu-bd-label">Session</span><span class="mu-bd-value">${formatCurrencyAlways(model.sessionCost || 0)}</span></span>
                                <span class="mu-bd-cell"><span class="mu-bd-label">Daily</span><span class="mu-bd-value">${formatCurrencyAlways(model.dailyCost || 0)}</span></span>
                                <span class="mu-bd-cell"><span class="mu-bd-label">Weekly</span><span class="mu-bd-value">${formatCurrencyAlways(model.weeklyCost || 0)}</span></span>
                            </div>
                        </div>`;
                    }).join('')}</div>`;
                }
                const policyNote = `<div style="display:flex;align-items:center;gap:8px;margin-top:12px;padding:8px 12px;background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);border-radius:8px;font-size:0.7rem;">
                    <span style="color:#22d3ee;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Policy</span>
                    <span style="color:rgba(255,255,255,0.45);">OpenRouter: Sonnet-only routing (no Opus)</span>
                </div>`;
                modelUsageCard.innerHTML = summaryHtml + breakdownHtml + policyNote + `<div class="mu-footer">Totals reflect tracked models only</div>`;
            modelUsageCard.classList.remove('section-updated');
            void modelUsageCard.offsetWidth; // trigger reflow
            modelUsageCard.classList.add('section-updated');
            } else {
                modelUsageCard.innerHTML = '<div class="empty-state">No telemetry yet</div>';
            }
            } // end model usage diff guard

            // Upcoming events (diff-guarded)
            if (sectionChanged('upcomingEvents', data.upcomingEvents)) {
            const eventsList = document.getElementById('events-list');
            if (data.upcomingEvents && data.upcomingEvents.length > 0) {
                eventsList.innerHTML = data.upcomingEvents.slice(0, compactMode ? 3 : 4).map(event => `
                    <div class="event-item">
                        <div class="event-time">${formatEventTime(event.time)}</div>
                        <div class="event-detail">
                            <div>${escapeHtml(event.title)}</div>
                            <div class="event-source">${escapeHtml(event.source || '')}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                eventsList.innerHTML = '<div class="empty-state">No upcoming events</div>';
            }
            } // end events diff guard

            // Device & watchdog status (diff-guarded)
            if (sectionChanged('devices', data.devices)) {
            const deviceList = document.getElementById('device-list');
            if (data.devices && data.devices.length > 0) {
                deviceList.innerHTML = data.devices.map(device => {
                    const statusClass = device.status === 'ok' ? 'ok' : device.status === 'error' ? 'error' : 'attention';
                    const statusLabel = device.status ? device.status.toUpperCase() : 'UNKNOWN';
                    return `
                        <div class="device-item">
                            <div class="device-name">${escapeHtml(device.name)}</div>
                            <div class="device-status ${statusClass}">${statusLabel}</div>
                            <p class="device-detail">${escapeHtml(device.detail || '')}</p>
                        </div>
                    `;
                }).join('');
            } else {
                deviceList.innerHTML = '<div class="empty-state">No device data</div>';
            }
            } // end devices diff guard

            // Today's Jobs (diff-guarded)
            if (sectionChanged('crons', data.crons)) {
            const todayJobsCard = document.getElementById('today-jobs-card');

            // Group crons by category
            const BASEBALL_ICON = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.5;vertical-align:middle;margin-right:3px"><circle cx="12" cy="12" r="10"/><path d="M4.9 4.9c3.2 2.4 5.3 5.9 5.3 7.1s-2.1 4.7-5.3 7.1M19.1 4.9c-3.2 2.4-5.3 5.9-5.3 7.1s2.1 4.7 5.3 7.1"/></svg>`;
            const categoryOrder = ['Intelligence Feed', 'Fantasy Baseball', 'Maintenance', 'Appointments'];
            const categoryIcons = { 'Fantasy Baseball': BASEBALL_ICON };
            const grouped = {};
            (data.crons || []).forEach(cron => {
                const cat = cron.category || 'Other';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(cron);
            });
            const cronRows = categoryOrder.filter(cat => grouped[cat]).map(cat => {
                const icon = categoryIcons[cat] || '';
                const rows = grouped[cat].map(cron => {
                    const dotClass = cron.status === 'ok' ? 'healthy' : cron.status === 'paused' ? 'paused' : cron.errors > 0 ? 'error' : 'healthy';
                    const errorNote = cron.errors > 0 ? ` · ${cron.errors} err` : '';
                    const agentName = cron.agent || 'JOSH 2.0';
                    const agentClass = agentName === 'J.A.I.N' ? 'jain' : 'josh';
                    const agentPill = `<span class="cron-agent-pill ${agentClass}">${escapeHtml(agentName)}</span>`;

                    if (cron.multiRun && cron.multiRun.runs) {
                        const timeBadges = cron.multiRun.runs.map(r => {
                            const cls = r.done ? 'run-badge done' : 'run-badge';
                            const modeClass = r.mode === 'Lite' ? ' lite' : '';
                            return `<span class="${cls}${modeClass}" title="${r.label} — ${r.mode}">${r.time.replace(' AM','a').replace(' PM','p')}</span>`;
                        }).join('');
                        return `
                            <div class="cron-row${cron.errors > 0 ? ' has-error' : ''} cron-multirun">
                                <div class="cron-dot ${dotClass}"></div>
                                <div class="cron-name-group">
                                    <div class="cron-name">${escapeHtml(cron.name)}${agentPill}</div>
                                    ${cron.description ? `<div class="cron-desc">${escapeHtml(cron.description)}</div>` : ''}
                                    <div class="cron-run-badges">${timeBadges}</div>
                                </div>
                            </div>`;
                    }

                    const schedule = cron.schedule || '';
                    return `
                        <div class="cron-row${cron.errors > 0 ? ' has-error' : ''}">
                            <div class="cron-dot ${dotClass}"></div>
                            <div class="cron-name-group">
                                <div class="cron-name">${escapeHtml(cron.name)}${agentPill}</div>
                                ${cron.description ? `<div class="cron-desc">${escapeHtml(cron.description)}</div>` : ''}
                            </div>
                            <div class="cron-schedule">${escapeHtml(schedule + errorNote)}</div>
                        </div>`;
                }).join('');
                return `<div class="cron-category">
                    <div class="cron-category-header">${icon}${escapeHtml(cat)}</div>
                    ${rows}
                </div>`;
            }).join('');
            const eventRows = (data.upcomingEvents || []).slice(0, compactMode ? 3 : 4).map(event => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(event.title || 'Untitled event')}</div>
                        <div class="job-detail">${escapeHtml(event.source || '')}</div>
                    </div>
                    <div class="job-chip">${escapeHtml(formatEventTime(event.time))}</div>
                </div>
            `).join('');
            const actionRows = (data.actionRequired || []).slice(0, compactMode ? 3 : 4).map(item => `
                <div class="job-row">
                    <div>
                        <div class="job-name">${escapeHtml(item.title || 'Action')}</div>
                        <div class="job-detail">${escapeHtml(item.priority || 'queued')}</div>
                    </div>
                    <div class="job-chip error">${escapeHtml(item.priority || 'alert')}</div>
                </div>
            `).join('');
            todayJobsCard.innerHTML = `
                <div class="jobs-shell">
                    <div class="job-group">
                        <div class="job-group-title">Automation Queue</div>
                        ${cronRows || '<div class="empty-state">No scheduled jobs</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Calendar / Triggers</div>
                        ${eventRows || '<div class="empty-state">No upcoming events</div>'}
                    </div>
                    <div class="job-group">
                        <div class="job-group-title">Action Required</div>
                        ${actionRows || '<div class="empty-state">Nothing urgent</div>'}
                    </div>
                </div>
            `;
            } // end crons diff guard

        }

        function formatTime(isoString) {
            if (!isoString) return 'never';
            const date = new Date(isoString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffMins < 1440) return `${Math.floor(diffMins / 60)}h ago`;
            return date.toLocaleDateString();
        }

        function formatCurrencyValue(value) {
            if (typeof value !== 'number') return '$0.00';
            if (value === 0) return '$0.00';
            if (value < 1) return `${(value * 100).toFixed(2)}¢`;
            return `$${value.toFixed(2)}`;
        }

        function formatCurrencyAlways(value) {
            if (typeof value !== 'number' || isNaN(value)) return '$0.00';
            if (value === 0) return '$0.00';
            if (value >= 0.01) return `$${value.toFixed(2)}`;
            // Show more precision for sub-cent values
            return `$${value.toFixed(4)}`;
        }

        function formatAbsoluteTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return isoString;
            return date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', second: '2-digit' });
        }

        function formatEventTime(isoString) {
            if (!isoString) return 'TBD';
            const date = new Date(isoString);
            if (Number.isNaN(date.getTime())) return isoString;
            const day = date.toLocaleDateString(undefined, { weekday: 'short' });
            const time = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            return `${day} ${time}`;
        }

        function escapeHtml(str) {
            if (typeof str !== 'string') return '';
            const replacements = {
                '&amp;': /&/g,
                '&lt;': /</g,
                '&gt;': />/g,
                '&quot;': /"/g,
                '&#x27;': /'/g,
                '&#x60;': /`/g,
            };
            let escaped = str;
            for (const char in replacements) {
                escaped = escaped.replace(replacements[char], char);
            }
            return escaped;
        }
        // === AUTO-INIT (after all functions defined) ===
        initDashboard();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(err => {
                    console.error('Service worker registration failed', err);
                });
            });
        }
    </script>

    <!-- Mobile viewport laser border overlay -->
    <div id="edge-laser" aria-hidden="true"></div>

</body>
</html>
