name: Mission Control Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static UI/data regression checks
        run: python3 scripts/mission_control_regression_check.py
