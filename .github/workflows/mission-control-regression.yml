name: Mission Control Regression

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install screenshot dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow playwright
          python3 -m playwright install --with-deps chromium
      - name: Run static UI/data regression checks
        run: python3 scripts/mission_control_regression_check.py
      - name: Run Brain Feed screenshot capture/diff
        # CI runners render fonts differently than the Mac kiosk lane.
        # Keep artifacts for visual review; local watchdog enforces diff.
        continue-on-error: true
        run: python3 scripts/mission_control_screenshot_diff.py --max-diff-ratio 0.08
      - name: Upload Brain Feed screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mission-control-brain-feed-screenshots
          path: |
            screenshots/current/*.png
            screenshots/diffs/*.png
          if-no-files-found: warn
          retention-days: 14
